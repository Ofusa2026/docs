<script>
docId='1_5_vi';
const _title='📄 参考様式第１－５号　特定技能雇用契約書（ベトナム語版）';
// f, v, esc, _fontSize, _editMode は ofusa_common.js で宣言済み

function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea');
  if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="font-size:8pt;margin-bottom:2px;">参考様式第１－５号<br><span class="id">Mẫu Tham Khảo 1-5</span></div>

<div style="text-align:center;font-size:13pt;font-weight:bold;letter-spacing:0.15em;margin:6px 0 2px;">特　定　技　能　雇　用　契　約　書</div>
<div style="text-align:center;font-size:9pt;font-weight:bold;margin-bottom:8px;" class="id">Hợp Đồng Tuyển Dụng Kỹ Năng Đặc Định</div>

<div style="font-size:8.5pt;line-height:1.8;margin-bottom:8px;">
  特定技能所属機関　${f('es_orgName')}　（以下「甲」という。）と<br>
  <span class="id" style="font-size:7.5pt;">Cơ quan liên kết kỹ năng đặc định　${f('es_orgNameEn')}</span><br>
  <span class="id" style="font-size:7.5pt;">(dưới đây gọi là bên A) và</span><br>
  特定技能外国人（候補者を含む。）　${f('es_applicantName')}　（以下「乙」という。）は、<br>
  <span class="id" style="font-size:7.5pt;">Người nước ngoài có kỹ năng đặc định (bao gồm cả ứng viên)　${f('es_applicantNameEn')}</span><br>
  <span class="id" style="font-size:7.5pt;">(dưới đây gọi là bên B)</span>
</div>

<div style="font-size:8.5pt;margin-bottom:4px;">
  別添の雇用条件書に記載された内容に従い，特定技能雇用契約を締結する。<br>
  <span class="id" style="font-size:7.5pt;">cùng ký kết Hợp đồng Kỹ năng Đặc định theo nội dung được mô tả trong Bản Điều kiện Tuyển dụng đi kèm.</span>
</div>



<div style="font-size:8.5pt;margin-bottom:6px;">
  本雇用契約は、乙が、在留資格「特定技能１号」若しくは「特定技能２号」の上陸許可又は在留資格変更許可等を受けた日から、甲乙双方が速やかに調整を行い、同日から１か月以内の甲乙双方の合意により定めた日から雇用を開始するものとする。<br>
  <span class="id" style="font-size:7pt;">Từ ngày bên B được cấp phép nhập cảnh vào Nhật với tư cách lưu trú "Kỹ năng đặc định số 1" hoặc "Kỹ năng đặc định số 2" hay được cấp phép thay đổi tư cách lưu trú, v.v, bên A và bên B sẽ cùng nhanh chóng thu xếp, và trong vòng 1 tháng kể từ ngày này, hợp đồng tuyển dụng này sẽ bắt đầu tuyển dụng từ ngày được xác định dựa theo sự thỏa thuận của hai bên.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  雇用条件書に記載の雇用契約期間（雇用契約の始期と終期）は、甲乙双方の調整により定めた雇用を開始する日に伴って変更されるものとする。<br>
  <span class="id" style="font-size:7pt;">Thời gian hợp đồng tuyển dụng trong bản điều kiện tuyển dụng (thời gian bắt đầu và kết thúc hợp đồng tuyển dụng) được thay đổi dựa theo ngày bắt đầu tuyển dụng được xác định theo sự thu xếp của bên A và bên B.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  甲乙双方は、乙の在留資格に係る審査結果を互いに情報共有することとする。<br>
  <span class="id" style="font-size:7pt;">Bên A và bên B sẽ chia sẻ thông tin cho nhau về kết quả thẩm tra liên quan đến tư cách lưu trú của bên B.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  なお，雇用契約を更新することなく雇用契約期間を満了した場合，及び乙が何らかの事由で在留資格を喪失した時点で雇用契約は終了するものとする。<br>
  <span class="id" style="font-size:7pt;">Trường hợp hết thời hạn hợp đồng tuyển dụng mà không có gia hạn hợp đồng tuyển dụng và bên B vì lý do gì đó mà bị mất tư cách lưu trú thì hợp đồng tuyển dụng kết thúc tại thời điểm đó.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:12px;">
  本雇用契約書及び雇用条件書は２部作成し，甲乙それぞれが保有するものとする。<br>
  <span class="id" style="font-size:7pt;">Hợp đồng Tuyển dụng này và Bản Điều kiện Tuyển dụng được lập thành 2 bản, bên A và bên B mỗi bên giữ một bản.</span>
</div>



<!-- 締結日 -->
<div style="text-align:right;font-size:8pt;margin-bottom:10px;line-height:1.8;">
  ${f('es_createY')}　年　${f('es_createM')}　月　${f('es_createD')}　日　締結<br>
  <span class="id" style="font-size:7.5pt;">Ký vào ngày ${f('es_createD')} tháng ${f('es_createM')} năm ${f('es_createY')}</span>
</div>

<!-- 署名欄 -->
<div style="display:flex;font-size:8pt;margin-top:8px;line-height:1.9;">
  <!-- 甲（左カラム）-->
  <div style="flex:1;">
    <div style="margin-left:10em;">${f('es_orgName')}</div>
    <div style="display:flex;align-items:center;"><span style="width:3em;">甲</span><span style="flex:1;"></span><span>${f('es_repTitle')}　${f('es_repName')}</span><span style="flex:1;"></span><span style="width:3em;text-align:right;">印</span></div>
    <div style="height:0.8em;"></div>
    <div style="font-size:7.5pt;">（特定技能所属機関名・代表者役職名・氏名・捺印）</div>
    <div style="height:0.8em;"></div>
    <div style="margin-left:10em;">${f('es_orgNameEn')}</div>
    <div style="display:flex;align-items:center;"><span style="min-width:3em;">Bên A</span><span style="flex:1;"></span><span>${f('es_repTitleEn')}　${f('es_repNameEn')}</span><span style="flex:1;"></span><span style="min-width:3em;text-align:right;">Đóng dấu</span></div>
    <div style="font-size:7pt;">(Tên cơ quan liên kết kỹ năng đặc định/<br>Chức vụ người đại diện/Tên họ/Đóng dấu)</div>
  </div>
  <!-- 乙（右カラム）-->
  <div style="flex:1;padding-left:3em;" class="sign-field" data-signer="applicant" data-label="乙署名">
    <div style="line-height:1.9;">&nbsp;</div><!-- orgName行と高さ合わせ -->
    <div>乙
      <div class="sign-field-area" style="height:22px;display:inline-block;min-width:10em;vertical-align:middle;position:relative;border-top:none;margin-top:0;">
        <span class="sign-field-placeholder" style="color:#bbb;font-size:9px;">← 署名</span>
        <img class="sign-field-img" style="display:none;max-height:20px;">
      </div>
    </div>
    <div style="height:0.8em;"></div>
    <div style="font-size:7.5pt;">（特定技能外国人の署名）</div>
    <div style="height:0.8em;"></div>
    <div>&nbsp;</div>
    <div>Bên B</div>
    <div style="font-size:7pt;">(Chữ ký của người nước ngoài có kỹ năng đặc định)</div>
  </div>
</div>

</div><!-- /doc -->
`;
  _fontSize=(_fontSize===8.5)?8.5:_fontSize;
  _applyFontSize();
  _apply15_viFontSize();
  setupPageTracker();
}

function _apply15_viFontSize(){
  const st=document.getElementById('_15_viFontStyle')||document.createElement('style');
  st.id='_15_viFontStyle';
  document.head.appendChild(st);
  const s=_fontSize/8.5;
  st.textContent=[
    `.doc [style*="font-size:13pt"]{font-size:${(13*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
  ].join('');
}

p();

// index.htmlからの案件選択を受信（自動追加）
if(!window._selectCaseListenerAdded){
  window._selectCaseListenerAdded=true;
  window.addEventListener('message', function(e){
    if(!e.data||e.data.type!=='SELECT_CASE') return;
    const info=e.data.info;
    if(!info||!info.caseId) return;
    console.log('[doc] SELECT_CASE received:', info);
    const sel=document.getElementById('caseSelect');
    if(sel){
      let found=false;
      for(let o of sel.options){
        try{ const d=JSON.parse(o.value); if(d.caseId===info.caseId){sel.value=o.value;found=true;break;} }catch(e2){}
      }
      if(!found){
        const opt=document.createElement('option');
        opt.value=JSON.stringify(info);
        opt.textContent='（indexから選択）';
        sel.appendChild(opt);
        sel.value=opt.value;
      }
    }
    if(typeof loadFromDB==='function'){ loadFromDB(info); }
    else if(typeof loadCaseToForm==='function'){ loadCaseToForm(info); }
  });
}
