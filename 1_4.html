<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>参考様式第１－４号</title>
<link rel="stylesheet" href="ofusa_common.css?v=1776264504">
<style>
.doc{padding:15mm!important;line-height:1.52!important;min-height:auto!important}
.tbl2{width:100%;border-collapse:collapse;font-size:10pt;margin-bottom:8px;}
.tbl2 td,.tbl2 th{border:1px solid #555;padding:3px 5px;vertical-align:top;}
@media print{
  .app-bar,.fp{display:none!important}
  .main{display:block!important}
  .doc{box-shadow:none!important;margin:0!important;padding:15mm!important}
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 参考様式第１－４号　特定技能外国人の報酬に関する説明書</div>
    <div class="ver">ver.20260416.01</div>
  </div>
  <div class="bar-btns">
    <button class="btn" id="editModeBtn" onclick="toggleEditMode()" style="background:#7c3aed;color:white;">✏️ 直接編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>登録支援機関</label><select id="filterOrg" onchange="filterCases()"></select>
    <label>所属機関</label><select id="filterCompany" onchange="filterCases()"></select>
    <label>検索</label><input id="filterText" oninput="filterCases()" placeholder="名前で絞り込み">
    <label>案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">基本情報</div>
      <div class="fg"><label>書類作成日</label><input id="f_docDate" oninput="p()"></div>
      <div class="fg"><label>申請人氏名</label><input id="f_applicant" oninput="p()"></div>
      <div class="fg"><label>所属機関名</label><input id="f_company" oninput="p()"></div>
      <div class="fg"><label>作成責任者役職・氏名</label><input id="f_author" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">申請人情報</div>
      <div class="fg"><label>役職・職務内容</label><input id="f_jobDesc" oninput="p()"></div>
      <div class="fg"><label>年齢</label><input id="f_age" oninput="p()"></div>
      <div class="fg"><label>性別</label><input id="f_gender" oninput="p()"></div>
      <div class="fg"><label>経験年数</label><input id="f_exp" oninput="p()"></div>
      <div class="fg"><label>月給（円）</label><input id="f_salaryM" oninput="p()"></div>
      <div class="fg"><label>時間給（円）</label><input id="f_salaryH" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">比較日本人（いる場合）</div>
      <div class="fg"><label>役職・職務内容</label><input id="f_jpJobDesc" oninput="p()"></div>
      <div class="fg"><label>年齢</label><input id="f_jpAge" oninput="p()"></div>
      <div class="fg"><label>性別</label><input id="f_jpGender" oninput="p()"></div>
      <div class="fg"><label>経験年数</label><input id="f_jpExp" oninput="p()"></div>
      <div class="fg"><label>報酬月額（円）</label><input id="f_jpSalary" oninput="p()"></div>
      <div class="fg"><label>賃金規程の有無</label><input id="f_wageReg" oninput="p()"></div>
      <div class="fg"><label>規程に基づく報酬（円）</label><input id="f_salaryRule" oninput="p()"></div>
      <div class="fg"><label>同等以上と考える理由</label><textarea id="f_jpReason" oninput="p()"></textarea></div>
    </div>
  </div>
</div>
<div class="pp">
  <div class="page-nav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <button class="pn-btn pn-btn-page" onclick="scrollToPage(2)">P2</button>
    <button class="pn-btn pn-btn-page" onclick="scrollToPage(3)">P3</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">10pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776264504"></script>
<script>
function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea'); if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="font-size:10pt;margin-bottom:2mm;">参考様式第１－４号</div>
<div style="font-size:14pt;font-weight:bold;text-align:center;margin-bottom:4mm;">特定技能外国人の報酬に関する説明書</div>
<div style="font-size:12pt;margin-bottom:4mm;">　申請人に対する報酬については、以下のとおり、「日本人が従事する場合の報酬の額と同等以上であること」を担保しています。</div>
<div style="font-size:12pt;font-weight:bold;margin-bottom:2mm;">１　申請人に対する報酬</div>
<table class="tbl2" style="margin-bottom:4mm;">
  <tr>
    <td style="width:38%;">①申請人の氏名</td>
    <td>${f('f_applicant')}</td>
  </tr>
  <tr>
    <td>②申請人の役職、職務内容、責任の程度</td>
    <td>${f('f_jobDesc')}</td>
  </tr>
  <tr>
    <td>③申請人の年齢、性別及び経験年数</td>
    <td>（${f('f_age')}歳）（${f('f_gender')}）（経験　${f('f_exp')}　年）</td>
  </tr>
  <tr>
    <td>④申請人に対する報酬</td>
    <td>月給　${f('f_salaryM')}　円　／　時間給　${f('f_salaryH')}　円</td>
  </tr>
  <tr>
    <td>⑤その他</td>
    <td></td>
  </tr>
</table>
<div style="font-size:9pt;margin-bottom:4mm;">
（注意）<br>
１　①は、在留カード（申請人が所持していない場合は旅券）と同一の氏名を記載すること。<br>
２　③の経験年数は、申請人に従事させる業務に係る経験年数を記載すること。<br>
３　④は、月給及び時間給以外の給与形態の場合については、月給又は時間給に換算した報酬を記載すること。また、月給又は時間給のいずれかを記載することで差し支えないが、本様式において統一して記載すること。<br>
４　⑤は、報酬以外の諸手当等が支給されている場合など特記すべき事項がある場合に記載すること。
</div>
<div style="font-size:12pt;font-weight:bold;margin-bottom:2mm;">２　比較対象となる日本人労働者がいる場合</div>
<table class="tbl2">
  <tr>
    <td style="width:38%;">①比較対象となる日本人労働者の役職、職務内容、責任の程度</td>
    <td colspan="2">${f('f_jpJobDesc')}</td>
  </tr>
  <tr>
    <td>②比較対象となる日本人労働者の年齢、性別及び経験年数</td>
    <td colspan="2">（${f('f_jpAge')}歳）（${f('f_jpGender')}）（${f('f_jpExp')}）</td>
  </tr>
  <tr>
    <td>③比較対象となる日本人労働者の報酬</td>
    <td colspan="2">月額　${f('f_jpSalary')}　円</td>
  </tr>
  <tr>
    <td rowspan="2">④賃金規程の有無及び賃金規程に基づく賃金</td>
    <td style="width:15%;">規程の有無</td>
    <td>${f('f_wageReg')}</td>
  </tr>
  <tr>
    <td>有の場合</td>
    <td>賃金規程に基づき、申請人と役職、職務内容、責任の程度が同等の日本人労働者に支払われるべき報酬<br>${f('f_salaryRule')}　円</td>
  </tr>
  <tr>
    <td>⑤申請人に対する報酬が日本人が従事する場合の報酬の額と同等以上であると考える理由</td>
    <td colspan="2">${f('f_jpReason')}</td>
  </tr>
  <tr>
    <td>⑥その他</td>
    <td colspan="2"></td>
  </tr>
</table>
</div>

<div class="doc">
<div class="page-num-label">P2</div>
<div style="font-size:9pt;margin-bottom:4mm;">
（注意）<br>
１　①は、比較対象となる日本人労働者の役職、職務内容、責任の程度が、申請人と同等であることを示すこと。<br>
２　②の経験年数は、比較対象となる日本人労働者の経験年数を記載すること。<br>
３　③は、月給及び時間給以外の給与形態の場合については、月給又は時間給に換算した報酬を記載すること。また、月給又は時間給のいずれかを記載すればよいが、本様式において統一して記載すること。<br>
４　④は、賃金規程を作成している場合には、必ず「有」を丸印で囲むこと。また、賃金規程に基づき、申請人と役職、職務内容、責任の程度が同等の日本人労働者に支払われるべき報酬を具体的に記載し、当該賃金規程を参考資料として添付すること。<br>
５　⑥は、報酬以外の諸手当等が支給されている場合など特記すべき事項がある場合に記載すること。
</div>
<div style="font-size:12pt;font-weight:bold;margin-bottom:2mm;">３　比較対象となる日本人労働者がいない場合</div>
<table class="tbl2" style="margin-bottom:4mm;">
  <tr>
    <td style="width:38%;">①最も近い職務を担う日本人労働者の職務内容や責任の程度</td>
    <td colspan="2"></td>
  </tr>
  <tr>
    <td>②最も近い職務を担う日本人労働者の年齢、性別及び経験年数</td>
    <td colspan="2">（　　　歳）（　男　・　女　）（経験　　　年）</td>
  </tr>
  <tr>
    <td>③最も近い職務を担う日本人労働者の報酬</td>
    <td colspan="2">月給　　　　　　円　／　時間給　　　　　　円</td>
  </tr>
  <tr>
    <td rowspan="2">④賃金規程の有無及び賃金規程に基づく賃金</td>
    <td style="width:15%;">規程の有無</td>
    <td>有　・　無</td>
  </tr>
  <tr>
    <td>有の場合</td>
    <td>賃金規程に基づき、申請人と役職、職務内容、責任の程度が同等の日本人労働者に支払われるべき報酬<br>月給　　　　円　／　時間給　　　　円</td>
  </tr>
  <tr>
    <td>⑤申請人に対する報酬が日本人が従事する場合の報酬の額と同等以上であると考える理由</td>
    <td colspan="2"></td>
  </tr>
  <tr>
    <td>⑥その他</td>
    <td colspan="2"></td>
  </tr>
</table>
<div style="font-size:9pt;margin-bottom:4mm;">
（注意）<br>
１　①は、申請人と最も近い職務を担う日本人労働者の役職、職務内容、責任の程度について、申請人と比べて、具体的にどのような差異があるのかも併せて、詳細に記載すること。<br>
２　②の経験年数は、申請人と最も近い職務を担う日本人労働者の経験年数を記載すること。<br>
３　③は、月給及び時間給以外の給与形態の場合については、月給又は時間給に換算した報酬を記載すること。また、月給又は時間給のいずれかを記載すればよいが、本様式において統一して記載すること。<br>
４　④は、賃金規程を作成している場合には、必ず「有」を丸印で囲むこと。また、賃金規程に基づき、申請人と役職、職務内容、責任の程度が最も近い日本人労働者に支払われるべき報酬を具体的に記載し、当該賃金規程を参考資料として添付すること。<br>
５　⑥は、報酬以外の諸手当等が支給されている場合など特記すべき事項がある場合に記載すること。
</div>
<div style="font-size:12pt;margin-bottom:4mm;">上記の記載内容は、事実と相違ありません。</div>
<div style="text-align:right;margin-bottom:2mm;">${f('f_docDate')}　作成</div>
</div>

<div class="doc">
<div class="page-num-label">P3</div>
<div style="text-align:right;margin-bottom:4mm;font-size:12pt;">
  <div style="margin-bottom:8mm;">特定技能所属機関の氏名又は名称　${f('f_company')}</div>
  <div>作成責任者　役職・氏名　　${f('f_author')}</div>
</div>
</div>`;
  _fontSize = (_fontSize === 8.5) ? 10 : _fontSize;
  _applyFontSize();
  _apply1_4FontSize();
  const lbl=document.getElementById('fontSizeLabel');if(lbl)lbl.textContent=_fontSize+'pt';
  setupPageTracker();
  fitDocToPreview();
}
function _apply1_4FontSize(){
  const st=document.getElementById('_1_4FontStyle')||document.createElement('style');
  st.id='_1_4FontStyle'; document.head.appendChild(st);
  const s=_fontSize/10;
  st.textContent=[
    `.doc [style*="font-size:14pt"]{font-size:${(14*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:12pt"]{font-size:${(12*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:10pt"]{font-size:${(10*s).toFixed(2)}pt!important}`,
    `.tbl2{font-size:${(10*s).toFixed(2)}pt!important}`,
  ].join('');
}
function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp=document.querySelector('.pp');
    const area=document.getElementById('pageArea');
    if(!pp||!area) return;
    const ppW=pp.clientWidth-40;
    const docW=794;
    if(ppW<docW){
      const scale=ppW/docW;
      area.querySelectorAll('.doc').forEach(d=>{d.style.zoom=scale;});
    } else {
      area.querySelectorAll('.doc').forEach(d=>{d.style.zoom=1;});
    }
  });
}
window.addEventListener('resize', fitDocToPreview);

async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info; try{info=JSON.parse(sel.value);}catch(e){return;}
  const {caseId,companyId,companyName}=info;
  try{
    const [cases,cos]=await Promise.all([
      sb('cases?select=applicant,emp_set_idx&id=eq.'+caseId),
      companyId?sb(`companies?select=name,author_name,author_title,emp_sets&id=eq.${companyId}`)
        :companyName?sb(`companies?select=name,author_name,author_title,emp_sets&name=eq.${encodeURIComponent(companyName)}`):Promise.resolve([])
    ]);
    const cas=cases&&cases[0]; const co=cos&&cos[0];
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(cas) s('f_applicant',cas.applicant||'');
    if(co){
      s('f_company',co.name||'');
      s('f_author',[co.author_title,co.author_name].filter(Boolean).join('　'));
      const idx=parseInt((cas&&cas.emp_set_idx)||0)||0;
      const es=(co.emp_sets||[])[idx]||{};
      s('f_jobDesc',es.foreignerJobDesc||'');
      s('f_salaryM',es.salaryMonthly||'');
      s('f_salaryH',es.salaryHourly||'');
      s('f_jpJobDesc',es.jpCompJobDesc||'');
      s('f_jpAge',es.jpCompAge||'');
      s('f_jpGender',es.jpCompGender||'');
      s('f_jpExp',es.jpCompExp||'');
      s('f_jpSalary',es.jpCompSalary||'');
      s('f_wageReg',es.wageRegulation||'');
      s('f_salaryRule',es.salaryRuleApply||'');
      s('f_jpReason',es.jpCompReason||'');
    }
    const persons=await sb('persons?select=age,gender,experience_years&case_id=eq.'+caseId);
    const pd=persons&&persons[0];
    if(pd){s('f_age',pd.age||'');s('f_gender',pd.gender||'');s('f_exp',pd.experience_years||'');}
    if(!v('f_docDate')){const n=new Date();document.getElementById('f_docDate').value=`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`;}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);console.error(e);}
}
initCaseSelect(); p();
</script>
</body>
</html>
