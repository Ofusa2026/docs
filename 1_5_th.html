  if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="font-size:8pt;margin-bottom:2px;">参考様式第１－５号<br><span class="id">แบบฟอร์มอ้างอิงเลขที่ 1-5</span></div>

<div style="text-align:center;font-size:13pt;font-weight:bold;letter-spacing:0.15em;margin:6px 0 2px;">特　定　技　能　雇　用　契　約　書</div>
<div style="text-align:center;font-size:9pt;font-weight:bold;margin-bottom:8px;" class="id">สัญญาการว่าจ้างแรงงานเฉพาะทาง</div>

<div style="font-size:8.5pt;line-height:1.8;margin-bottom:8px;">
  特定技能所属機関　${f('es_orgName')}　（以下「甲」という。）と<br>
  <span class="id" style="font-size:7.5pt;">องค์กรที่แรงงานเฉพาะทางสังกัด　${f('es_orgNameEn')}</span><br>
  <span class="id" style="font-size:7.5pt;">(ซึ่งต่อไปจะเรียกว่า "ผู้ว่าจ้าง") และ</span><br>

</div>

<div style="font-size:8.5pt;margin-bottom:4px;">
  別添の雇用条件書に記載された内容に従い，特定技能雇用契約を締結する。<br>
  <span class="id" style="font-size:7.5pt;">ได้ร่วมตกลงทำสัญญาการว่าจ้างแรงงานเฉพาะทางตามเงื่อนไขที่ระบุในเอกสารเงื่อนไขการว่าจ้างซึ่งเป็นเอกสารแนบ</span>
</div>



<div style="font-size:8.5pt;margin-bottom:6px;">
  本雇用契約は、乙が、在留資格「特定技能１号」若しくは「特定技能２号」の上陸許可又は在留資格変更許可等を受けた日から、甲乙双方が速やかに調整を行い、同日から１か月以内の甲乙双方の合意により定めた日から雇用を開始するものとする。<br>
  <span class="id" style="font-size:7pt;">สัญญาว่าจ้างฉบับนี้จะมีผลบังคับใช้เมื่อผู้รับจ้างได้เข้ามายังประเทศญี่ปุ่นโดยมีสถานการพำนักเป็น "ทักษะเฉพาะทางที่ 1" หรือ "ทักษะเฉพาะทางที่ 2" ตั้งแต่วันที่ได้รับอนุญาตดังกล่าว โดยทั้งผู้ว่าจ้างและผู้รับจ้างจะทำการปรับตกลงกันโดยเร็ว และเริ่มการจ้างงานตั้งแต่วันที่ได้ตกลงร่วมกันของทั้งสองฝ่ายภายใน 1 เดือนนับจากวันดังกล่าว</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">

  <span class="id" style="font-size:7pt;">ระยะเวลาของสัญญาจ้างงานที่ระบุในเอกสารเงื่อนไขการว่าจ้างงาน (วันเริ่มต้นและวันสิ้นสุดของสัญญาจ้างงาน) จะถูกปรับเปลี่ยนตามวันที่เริ่มต้นการจ้างงานที่กำหนดโดยการปรับตกลงระหว่างผู้ว่าจ้างและผู้รับจ้าง</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  甲乙双方は、乙の在留資格に係る審査結果を互いに情報共有することとする。<br>
  <span class="id" style="font-size:7pt;">ผู้ว่าจ้างและผู้รับจ้าง จะทำการแลกเปลี่ยนข้อมูลเกี่ยวกับผลการตรวจสอบสถานภาพการพำนักของผู้รับจ้าง</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  なお，雇用契約を更新することなく雇用契約期間を満了した場合，及び乙が何らかの事由で在留資格を喪失した時点で雇用契約は終了するものとする。<br>
  <span class="id" style="font-size:7pt;">ทั้งนี้ ในกรณีที่สิ้นสุดระยะเวลาตามสัญญาว่าจ้างโดยที่ไม่มีการต่อสัญญาว่าจ้าง หรือในกรณีที่ผู้รับจ้างสูญเสียสถานการพำนักไม่ว่าด้วยสาเหตุใดๆ ก็ตาม ให้ถือว่าสัญญาว่าจ้างฉบับนี้สิ้นสุดลง</span>
</div>

<div style="font-size:8.5pt;margin-bottom:12px;">
  本雇用契約書及び雇用条件書は２部作成し，甲乙それぞれが保有するものとする。<br>
  <span class="id" style="font-size:7pt;">สัญญาว่าจ้างฉบับนี้และเอกสารเงื่อนไขการว่าจ้างได้ถูกจัดทำขึ้นเป็น 2 ฉบับ โดยผู้ว่าจ้างและผู้รับจ้างต่างถือไว้ฝ่ายละ 1 ฉบับ</span>
</div>



<!-- 締結日 -->
<div style="text-align:right;font-size:8pt;margin-bottom:10px;line-height:1.8;">
  ${f('es_createY')}　年　${f('es_createM')}　月　${f('es_createD')}　日　締結<br>
  <span class="id" style="font-size:7.5pt;">${f('es_createY')} ปี ${f('es_createM')} เดือน ${f('es_createD')} วัน ที่ทำสัญญา</span>
</div>

<!-- 署名欄 -->
<div style="display:flex;font-size:8pt;margin-top:8px;line-height:1.9;">
  <!-- 甲（左カラム）-->
  <div style="flex:1;">
    <div style="margin-left:10em;">${f('es_orgName')}</div>
    <div style="display:flex;align-items:center;"><span style="width:3em;">甲</span><span style="flex:1;"></span><span>${f('es_repTitle')}　${f('es_repName')}</span><span style="flex:1;"></span><span style="width:3em;text-align:right;">印</span></div>
    <div style="height:0.8em;"></div>
    <div style="font-size:7.5pt;">（特定技能所属機関名・代表者役職名・氏名・捺印）</div>
    <div style="height:0.8em;"></div>
    <div style="margin-left:10em;">${f('es_orgNameEn')}</div>
    <div style="display:flex;align-items:center;"><span style="min-width:3em;">ผู้ว่าจ้าง</span><span style="flex:1;"></span><span>${f('es_repTitleEn')}　${f('es_repNameEn')}</span><span style="flex:1;"></span><span style="min-width:3em;text-align:right;">ตราประทับ</span></div>
    <div style="font-size:7pt;">(ชื่อองค์กรที่แรงงานเฉพาะทางสังกัด,<br>ชื่อตำแหน่งตัวแทนองค์กร, ชื่อ-นามสกุล, ตราประทับ)</div>
  </div>
  <!-- 乙（右カラム）-->
  <div style="flex:1;padding-left:3em;" class="sign-field" data-signer="applicant" data-label="乙署名">
    <div style="line-height:1.9;">&nbsp;</div><!-- orgName行と高さ合わせ -->
    <div>乙
      <div class="sign-field-area" style="height:22px;display:inline-block;min-width:10em;vertical-align:middle;position:relative;border-top:none;margin-top:0;">
        <span class="sign-field-placeholder" style="color:#bbb;font-size:9px;">← 署名</span>
        <img class="sign-field-img" style="display:none;max-height:20px;">
      </div>
    </div>
    <div style="height:0.8em;"></div>
    <div style="font-size:7.5pt;">（特定技能外国人の署名）</div>
    <div style="height:0.8em;"></div>
    <div>&nbsp;</div>
    <div>ผู้รับจ้าง</div>
    <div style="font-size:7pt;">(ลายมือชื่อของแรงงานเฉพาะทางชาวต่างชาติ)</div>

`;
  _fontSize=(_fontSize===8.5)?8.5:_fontSize;
  _applyFontSize();
  _apply15_thFontSize();
  setupPageTracker();
}

function _apply15_thFontSize(){
  const st=document.getElementById('_15_thFontStyle')||document.createElement('style');
  st.id='_15_thFontStyle';
  document.head.appendChild(st);
  const s=_fontSize/8.5;
  st.textContent=[
    `.doc [style*="font-size:13pt"]{font-size:${(13*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
  ].join('');
}

p();

// index.htmlからの案件選択を受信（自動追加）
if(!window._selectCaseListenerAdded){
  window._selectCaseListenerAdded=true;
  window.addEventListener('message', function(e){
    if(!e.data||e.data.type!=='SELECT_CASE') return;
    const info=e.data.info;
    if(!info||!info.caseId) return;
    console.log('[doc] SELECT_CASE received:', info);
    const sel=document.getElementById('caseSelect');
    if(sel){
      let found=false;
      for(let o of sel.options){
        try{ const d=JSON.parse(o.value); if(d.caseId===info.caseId){sel.value=o.value;found=true;break;} }catch(e2){}
      }
      if(!found){
        const opt=document.createElement('option');
        opt.value=JSON.stringify(info);
        opt.textContent='（indexから選択）';
        sel.appendChild(opt);
        sel.value=opt.value;
      }
    }
    if(typeof loadFromDB==='function'){ loadFromDB(info); }
    else if(typeof loadCaseToForm==='function'){ loadCaseToForm(info); }
  });
}
