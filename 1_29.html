<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>参考様式第１－２９号</title>
<link rel="stylesheet" href="ofusa_common.css?v=20260415c">
<style>
@page{margin:0}
@media print{
  .appbar,.panel-left{display:none!important}
  .panel-right{margin:0!important;padding:0!important}
  .doc{padding:12mm 10mm;font-size:7.8pt;box-shadow:none!important;margin:0!important}
  .f[style*="color:#aaa"]{visibility:hidden}
}
</style>
</head>
<body>
<div class="appbar">
  <div class="appbar-title" id="docTitle">📄 参考様式第１－２９号</div>
  <div class="ver">ver.20260415.02</div>
  <div class="appbar-actions">
    <label>文字: </label>
    <button class="btn btn-sm" onclick="changeFontSize(-0.5)">A-</button>
    <span id="fontSizeLabel">8.5pt</span>
    <button class="btn btn-sm" onclick="changeFontSize(0.5)">A+</button>
    <button id="editModeBtn" class="btn" onclick="toggleEditMode()">✏️ 直接編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn" onclick="sendSignRequest()" style="background:#b45309;color:white;">✉️ 署名依頼</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>

<div class="layout">
  <div class="panel-left">
    <div class="filter-section">
      <div class="fg"><label>登録支援機関</label><select id="filterOrg" onchange="filterCases()" style="width:100%"><option value="">── すべて ──</option></select></div>
      <div class="fg"><label>所属機関</label><select id="filterCompany" onchange="filterCases()" style="width:100%"><option value="">── すべて ──</option></select></div>
      <div class="fg"><label>検索</label><input id="filterText" oninput="filterCases()" style="width:100%"></div>
      <div class="fg"><label>案件選択 <span id="caseCount" class="fid"></span></label>
        <select id="caseSelect" onchange="loadFromDB()" style="width:100%"><option value="">── 選択 ──</option></select>
      </div>
    </div>
    <hr>
    <div class="section-title">基本情報</div>
    <div class="fg"><label>書類作成日<span class="fid">f_docDate</span></label><input id="f_docDate" oninput="p()"></div>
    <div class="fg"><label>所属機関名<span class="fid">f_company</span></label><input id="f_company" oninput="p()"></div>
    <div style="font-size:11px;color:#666;margin-top:8px;">※本書類はほぼ固定文です。<br>案件選択で機関名と日付が自動入力されます。</div>
  </div>

  <div class="panel-right" id="pageArea">
    <div class="doc">
      <div class="page-num-label">P1</div>
      <div id="docContent"></div>
    </div>
  </div>
</div>

<script src="ofusa_common.js?v=20260415c"></script>
<script>
function fv(id){const v=document.getElementById(id)?.value||'';return v?`<span class="f">${v}</span>`:`<span class="f" style="color:#aaa;font-size:0.85em;font-family:monospace;">${id}</span>`;}
function gv(id){return document.getElementById(id)?.value||'';}

function p(){
  if(_editMode) return;
  document.getElementById('docContent').innerHTML = `
<div style="text-align:right;font-size:7.5pt;margin-bottom:2mm;">参考様式第１－２９号</div>
<div style="font-size:10pt;font-weight:bold;text-align:center;margin-bottom:6mm;">書類省略に当たっての誓約書</div>

<div style="font-size:8.5pt;line-height:1.8;">

<div style="margin-bottom:4mm;">
今般の申請にあたり、以下の事項を含め、出入国管理及び難民認定法令に適合していることを、誓約します。この誓約が虚偽であり、又はこの誓約に反した場合には、出入国管理及び難民認定法令に関し不正又は著しい不当な行為をしたものとして５年間の受入れができないこととなることも理解しています。
</div>

<div style="margin-bottom:3mm;">１　申請書（所属機関作成用）で申告した事項及びその他提出書類の内容に虚偽でなく、以下のいずれにも滞納がないこと</div>

<div style="margin-left:4mm;margin-bottom:4mm;">
（１）労働関係法令の遵守<br>
<div style="margin-left:4mm;">労働保険料（適用事業所のみ）</div>
（２）社会保険関係法令の遵守<br>
<div style="margin-left:4mm;">
  ア　健康保険・厚生年金保険の適用事業所の場合<br>
  <div style="margin-left:4mm;">健康保険・厚生年金保険料</div>
  イ　健康保険・厚生年金保険の適用事業所の場合ではない場合<br>
  <div style="margin-left:4mm;">
    （ア）事業主の国民健康保険料<br>
    （イ）事業主の国民年金保険料
  </div>
</div>
（３）租税関係の法令遵守<br>
<div style="margin-left:4mm;">
  ア　法人の場合<br>
  <div style="margin-left:4mm;">
    （ア）国税（源泉所得税及び復興特別所得税、法人税、消費税及び地方消費税）<br>
    （イ）地方税（法人住民税）
  </div>
  イ　個人事業主の場合<br>
  <div style="margin-left:4mm;">
    （ア）国税（源泉所得税及び復興特別所得税、消費税及び地方消費税、相続税、贈与税）<br>
    （イ）地方税（個人住民税）
  </div>
</div>
</div>

<div style="margin-bottom:3mm;">２　特定技能外国人の受入れ後は、出入国管理及び難民認定法第１９条の１８第２項第１号又は第３号の規定に基づき、事実に即した内容を適正に届け出ること</div>

<div style="margin-bottom:8mm;">３　出入国在留管理局が行う、関係書類の提出指導、事情聴取、実地調査等の調査に応じること</div>

</div>

<div style="text-align:right;font-size:8pt;">
  <div style="margin-bottom:2mm;">${fv('f_docDate')}</div>
  <div>特定技能所属機関名　　　${fv('f_company')}</div>
</div>
`;
}

async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info;
  try{info=JSON.parse(sel.value);}catch(e){return;}
  const {companyId,companyName}=info;
  try{
    const q=companyId?`companies?select=name&id=eq.${companyId}`:companyName?`companies?select=name&name=eq.${encodeURIComponent(companyName)}`:null;
    if(!q) return;
    const cos=await sb(q);
    const co=cos&&cos[0];
    if(!co) return;
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    s('f_company', co.name||'');
    if(!gv('f_docDate')){const n=new Date();document.getElementById('f_docDate').value=`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`;}
    p();
    showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);}
}

console.log('%c OFUSA 書類作成システム %c ver.20260415.02 ','background:#1a2e4a;color:white;font-weight:bold;padding:2px 6px;','background:#475569;color:white;padding:2px 6px;');
initCaseSelect();
p();
</script>
</body>
</html>
