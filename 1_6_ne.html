        <div style="margin-top:2px;">${cb(false,'shift_work')}&nbsp;交代制として，次の勤務時間の組合せによる。<br><span class="id" style="font-size:7pt;">${cb(false,'shift_work_id')} शिफ्ट प्रणाली: निम्न काम समयको संयोजनअनुसार।</span></div>
        ${(()=>{
          // シフトデータがあれば実データ、なければ空欄行を5行表示
          const rows = shifts.length > 0 ? shifts : [{start:'',end:'',h:'',min:'',days:'',daysEn:''}];
          const maxRows = shifts.length > 0 ? shifts.length : 5;
          return Array.from({length:maxRows},(_,i)=>{
            const s = rows[i]||{start:'',end:'',h:'',min:'',days:'',daysEn:''};
            const startStr = s.start ? s.start : '&emsp;時&emsp;分';
            const endStr   = s.end   ? s.end   : '&emsp;時&emsp;分';
            const daysStr  = s.days  ? s.days  : '&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;';
            const hStr     = s.h     ? s.h     : '&emsp;&emsp;';
            const minStr   = s.min   ? s.min   : '&emsp;&emsp;';
            const daysEnStr= s.daysEn? s.daysEn: '&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;';
            return `<div style="font-size:7.5pt;">始業(${startStr})終業(${endStr})(適用日${daysStr},１日の所定労働時間${hStr}時間${minStr}分)<br><span class="id" style="font-size:6.5pt;">Jam mulai(${startStr})Jam selesai(${endStr}).(Hari penerapan ${daysEnStr}),Jam kerja dalam 1 hari ${hStr}jam${minStr}menit)</span></div>`;
          }).join('');
        })()}

  'payCutoff':'payCutoffDay','payCutoffEn':'payCutoffDayEn',

  // 分フィールド（フォームはMin、DBはMins）

// DB→フォームの逆引き
const _DB_TO_FORM = {};
Object.keys(_FORM_TO_DB).forEach(k=>{ _DB_TO_FORM[_FORM_TO_DB[k]] = k; });

function formKeyToDb(formKey){ return _FORM_TO_DB[formKey] || formKey; }
function dbKeyToForm(dbKey){ return _DB_TO_FORM[dbKey] || dbKey; }

// すべてのフォームフィールドIDをリストアップ
function getAllFormFields(){
  return Array.from(document.querySelectorAll('[id^="es_"]'))
    .filter(el=>!el.id.includes('${'))
    .map(el=>el.id.replace('es_',''));
}

// フォームに値をセット
function setFormValues(esData){
  if(!esData) return;

  // ヘルパー：要素に値をセット
  const set = (id, val) => { const e=document.getElementById(id); if(e && val!=null) e.value=val; };
  // 日付文字列（YYYY-MM-DD or YYYY/MM/DD）をY/M/Dに分割してセット
  const setDate = (prefix, val) => {
    if(!val) return;
    const m = String(val).match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
    if(m){ set('es_'+prefix+'Y',m[1]); set('es_'+prefix+'M',String(parseInt(m[2]))); set('es_'+prefix+'D',String(parseInt(m[3]))); }
  };

  // 1. 各DBキーをフォームにマッピング
  Object.keys(esData).forEach(dbKey=>{
    let val = esData[dbKey];
    if(val==null || val==='') return;
    const formKey = dbKeyToForm(dbKey);

    // 日付系は分割セット
    if(dbKey==='contractStart'){ setDate('contractStart',val); return; }
    if(dbKey==='contractEnd')  { setDate('contractEnd',val); return; }

    // 分野・区分: 末尾の（特定技能１号）等を除去
    if(dbKey==='applicantField'||dbKey==='category'||dbKey==='applicantFieldEn'||dbKey==='categoryEn'){
      val = String(val).replace(/[（(][^）)]*[）)]/g,'').trim();
    }

    // allowance動的フォーム（DBキー: allowance1Name → フォームID: es_a1Name）
    const am = dbKey.match(/^allowance(\d)(Name|NameEn|Amt|Amount|Cond|CondEn)$/);
    if(am){
      const n=am[1], part=am[2];
      const partMap = {Name:'Name',NameEn:'NameEn',Amt:'Amt',Amount:'Amt',Cond:'Calc',CondEn:'CalcEn'};
      set('es_a'+n+(partMap[part]||part), val);
      return;
    }

    // 通常フォーム
    set('es_'+formKey, val);
  });

  // 2. 給与形態別セット
  if(esData.salaryAmt || esData.salaryMonthly){
    const amt = esData.salaryAmt || esData.salaryMonthly;
    const st = esData.salaryType || '月給';
    if(st==='時給'||st==='hourly') set('es_salaryHourly', amt);
    else if(st==='日給'||st==='daily') set('es_salaryDaily', amt);
    else set('es_salaryMonthly', amt);
  }

  // 3. 契約更新（renewal）
  if(esData.contractRenewal){
    const rv = esData.contractRenewal;
    const renewMap = {'自動':'auto','possible':'possible','更新する場合':'possible','なし':'none','none':'none'};
    const mapped = renewMap[rv] || (rv.includes('自動')?'auto':rv.includes('可能')||rv.includes('あり')?'possible':'none');
    set('es_renewal', mapped);
  }

  // 4. applicantName は persons から別途セット済みのため上書きしない
  p();
}

// フォームから値を収集してDB用オブジェクトに変換
function collectFormValues(){
  const data = {};
  getAllFormFields().forEach(formKey=>{
    const el = document.getElementById('es_'+formKey);
    if(el && el.value.trim()!==''){
      // 動的手当フォーム (a1Name→allowance1Name, a1Amt→allowance1Amt 等)
      const am = formKey.match(/^a(\d)(Name|NameEn|Amt|Calc|CalcEn)$/);
      if(am){
        const n=am[1], part=am[2];
        const partMap={Name:'Name',NameEn:'NameEn',Amt:'Amt',Calc:'Cond',CalcEn:'CondEn'};
        data['allowance'+n+(partMap[part]||part)] = el.value.trim();
        return;
      }
      const dbKey = formKeyToDb(formKey);
      data[dbKey] = el.value.trim();
    }
  });
  const nameEl = document.getElementById('applicantName');
  if(nameEl && nameEl.value.trim()) data.applicantName = nameEl.value.trim();
  return data;
}

// 案件選択時にDBからデータ読込
async function loadFromDB(){
  if(_currentDoc==='iko'){ await loadFromDB_iko(); return; }
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info;
  try{ info=JSON.parse(sel.value); }catch(e){ return; }
  const {caseId, companyId, companyName, empSetIdx, applicantField, applicantFieldEn} = info;

  // ローディング表示
  const pageArea = document.getElementById('pageArea');
  if(pageArea){ const old=pageArea.querySelector('.db-loading'); if(old) old.remove(); }

  try{
    // 1. 案件基本情報 + 人材データ（persons）を同時取得
    const [cases, persons] = await Promise.all([
      sb('cases?select=id,name,applicant,applicant_field,applicant_field_en,company_id,emp_set_idx&id=eq.'+caseId),
      sb('persons?select=*&case_id=eq.'+caseId)
    ]);
    const cas = cases && cases[0];
    const _pdRaw = persons && persons[0];
    // personsはdataカラム（JSONB）かフラット形式かを両方対応
    const pd = (_pdRaw && _pdRaw.data) || _pdRaw;
    // 申請人名（パスポート英語氏名）= persons内 > cases.applicant の順で取得
    const personName = (pd && (pd.applicant_name_en || pd.applicantNameEn || pd.nameEn)) || (cas && cas.applicant) || '';

    // 2. 所属機関（企業）情報 → emp_sets
    let esData = null;
    // companyIdがあればid検索、なければ会社名で検索
    const _coQuery = companyId
      ? 'companies?select=id,name,name_en,pref,city,address,address_en,tel,rep_name,rep_title,rep_name_en,rep_title_en,emp_sets&id=eq.'+companyId
      : companyName
        ? 'companies?select=id,name,name_en,pref,city,address,address_en,tel,rep_name,rep_title,rep_name_en,rep_title_en,emp_sets&name=eq.'+encodeURIComponent(companyName)
        : null;
    if(_coQuery){
      const cos = await sb(_coQuery);
      const co = cos && cos[0];
      if(co){
        // 所属機関基本情報をセット
        const _s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
        _s('es_orgName',    co.name||'');
        _s('es_orgNameEn',  co.name_en||'');
        _s('es_orgAddress', (co.pref||'')+(co.city||'')+(co.address||''));
        _s('es_orgAddressEn', co.address_en||'');
        _s('es_orgTel',     co.tel||'');
        _s('es_repName',    co.rep_name||'');
        _s('es_repTitle',   co.rep_title||'');
        _s('es_repNameEn',  co.rep_name_en||'');
        _s('es_repTitleEn', co.rep_title_en||'');

        // empSets から指定インデックスの雇用条件を取得
        const empSets = co.emp_sets || [];
        const idx = empSetIdx !== '' && empSetIdx != null ? parseInt(empSetIdx) : 0;
        esData = empSets[idx] || empSets[0] || null;

      }
    }

    // 3. 申請人名・分野・契約期間
    const nameEl=document.getElementById('applicantName');
    if(nameEl && personName) nameEl.value=personName;
    if(cas){
      const _stripParens = s => s ? s.replace(/[（(][^）)]*[）)]/g, '').trim() : '';
      const fieldEl=document.getElementById('es_applicantField'); if(fieldEl && cas.applicant_field) fieldEl.value=_stripParens(cas.applicant_field);
      const fieldEnEl=document.getElementById('es_applicantFieldEn'); if(fieldEnEl && cas.applicant_field_en) fieldEnEl.value=_stripParens(cas.applicant_field_en);
    }
    // personsから契約期間を分割セット（empSetsに入っていないケースの補完）
    const _setDate=(prefix,val)=>{
      if(!val) return;
      const m=String(val).match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
      if(!m) return;
      const _si=(id,v)=>{const e=document.getElementById(id);if(e&&!e.value)e.value=v;};
      _si('es_'+prefix+'Y',m[1]);
      _si('es_'+prefix+'M',String(parseInt(m[2])));
      _si('es_'+prefix+'D',String(parseInt(m[3])));
    };
    if(pd){
      _setDate('contractStart', pd.contractStart||pd.contract_start);
      _setDate('contractEnd',   pd.contractEnd||pd.contract_end);
      _setDate('entry',         pd.entryDate||pd.entry_date);
    }

    // 4. 雇用条件データをフォームにセット
    if(esData) setFormValues(esData);

    // 5. 今日の日付を作成日にセット（未入力の場合）
    const today = new Date();
    const cyEl=document.getElementById('es_createY'); if(cyEl && !cyEl.value) cyEl.value=today.getFullYear();
    const cmEl=document.getElementById('es_createM'); if(cmEl && !cmEl.value) cmEl.value=today.getMonth()+1;
    const cdEl=document.getElementById('es_createD'); if(cdEl && !cdEl.value) cdEl.value=today.getDate();

    p(); // プレビュー更新
    showToast('✅ データを読み込みました');
  }catch(e){
    console.error('DB読込エラー:',e);
    showToast('⚠️ 読込エラー: '+e.message);
  }
}

// DB保存（companies.emp_sets に上書き保存）
async function saveForm(){
  const sel=document.getElementById('caseSelect');
  let info;
  try{ info=JSON.parse(sel.value); }catch(e){ alert('案件情報が不正です'); return; }
  const {companyId, empSetIdx} = info;

  try{
    // 現在のemp_setsを取得
    const cos = await sb('companies?select=id,emp_sets&id=eq.'+companyId);
    const co = cos && cos[0];

    const empSets = co.emp_sets ? JSON.parse(JSON.stringify(co.emp_sets)) : [];
    const idx = empSetIdx !== '' && empSetIdx != null ? parseInt(empSetIdx) : 0;

    // 現在のフォーム値を収集
    const newData = collectFormValues();
    newData.setName = (empSets[idx] && empSets[idx].setName) || 'ヒアリング取込';
    newData._savedAt = new Date().toISOString();

    // 指定インデックスを更新（なければ追加）
    while(empSets.length <= idx) empSets.push({setName:'条件'+(empSets.length+1)});
    Object.assign(empSets[idx], newData);

    // Supabaseに保存
    const res = await sb('companies?id=eq.'+companyId, {
      method:'PATCH',
      headers:{'Prefer':'return=minimal'},
      body:JSON.stringify({emp_sets: empSets})
    });

    showToast('✅ 保存しました');
  }catch(e){
    console.error('DB保存エラー:',e);
    alert('保存エラー: '+e.message);
  }
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.3);font-family:sans-serif;';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
