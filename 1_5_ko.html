<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title" id="docTitle">📄 参考様式第１－５号　特定技能雇用契約書（韓国語版）</div>

<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>🔍 登録支援機関</label>
    <select id="filterOrg" onchange="filterCases()" style="width:100%;padding:4px;border:1px solid #bbb;border-radius:3px;font-size:11px;margin-bottom:5px;"></select>
    <label>🏢 所属機関</label>
    <select id="filterCompany" onchange="filterCases()" style="width:100%;padding:4px;border:1px solid #bbb;border-radius:3px;font-size:11px;margin-bottom:5px;"></select>
    <label>🔤 検索（案件名・人材名）</label>
    <input id="filterKeyword" oninput="filterCases()" placeholder="名前・案件名で絞り込み" style="width:100%;padding:4px;border:1px solid #bbb;border-radius:3px;font-size:11px;margin-bottom:5px;">
    <label>👤 案件選択 <span id="caseCount" style="font-size:9px;color:#888;"></span></label>
    <select id="caseSelect" size="6" style="width:100%;padding:2px;border:1px solid #bbb;border-radius:3px;font-size:11px;" onchange="selectCase()"></select>
  </div>
  <div class="fp-inner" id="formArea">
    <div class="fs"><div class="fs-title">所属機関</div>
      <div class="fg"><label>機関名（日）<span class="fid">es.orgName</span></label><input id="es_orgName" oninput="p()"></div>
      <div class="fg"><label>機関名（KO）<span class="fid">es.orgNameEn</span></label><input id="es_orgNameEn" oninput="p()"></div>
      <div class="fg"><label>代表者役職（日）<span class="fid">es.repTitle</span></label><input id="es_repTitle" oninput="p()"></div>
      <div class="fg"><label>代表者氏名（日）<span class="fid">es.repName</span></label><input id="es_repName" oninput="p()"></div>
      <div class="fg"><label>代表者役職（KO）<span class="fid">es.repTitleEn</span></label><input id="es_repTitleEn" oninput="p()"></div>
      <div class="fg"><label>代表者氏名（KO）<span class="fid">es.repNameEn</span></label><input id="es_repNameEn" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">作成日</div>
      <div class="fg"><label>作成年<span class="fid">es.createY</span></label><input id="es_createY" oninput="p()"></div>
      <div class="fg"><label>作成月<span class="fid">es.createM</span></label><input id="es_createM" oninput="p()"></div>
      <div class="fg"><label>作成日<span class="fid">es.createD</span></label><input id="es_createD" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">特定技能外国人</div>
      <div class="fg"><label>氏名（日）<span class="fid">es.applicantName</span></label><input id="es_applicantName" oninput="p()"></div>
      <div class="fg"><label>氏名（KO）<span class="fid">es.applicantNameEn</span></label><input id="es_applicantNameEn" oninput="p()"></div>

  </div>
</div>
<div class="pp">
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776985876"></script>
<script>
docId='1_5_ko';
const _title='📄 参考様式第１－５号　特定技能雇用契約書（韓国語版）';
// f, v, esc, _fontSize, _editMode は ofusa_common.js で宣言済み

function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea');
  if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="font-size:8pt;margin-bottom:2px;">参考様式第１－５号<br><span class="id">참고 양식 제1-5호</span></div>

<div style="text-align:center;font-size:13pt;font-weight:bold;letter-spacing:0.15em;margin:6px 0 2px;">特　定　技　能　雇　用　契　約　書</div>
<div style="text-align:center;font-size:9pt;font-weight:bold;margin-bottom:8px;" class="id">특정기능 고용계약서</div>

<div style="font-size:8.5pt;line-height:1.8;margin-bottom:8px;">
  特定技能所属機関　${f('es_orgName')}　（以下「甲」という。）と<br>
  <span class="id" style="font-size:7.5pt;">특정기능 소속 기관　${f('es_orgNameEn')}</span><br>
  <span class="id" style="font-size:7.5pt;">(이하 "갑"이라고 한다.)과</span><br>
  特定技能外国人（候補者を含む。）　${f('es_applicantName')}　（以下「乙」という。）は、<br>
  <span class="id" style="font-size:7.5pt;">특정기능 외국인(후보자 포함)　${f('es_applicantNameEn')}</span><br>
  <span class="id" style="font-size:7.5pt;">(이하 「을」이라고 한다.)은,</span>
</div>

<div style="font-size:8.5pt;margin-bottom:4px;">
  別添の雇用条件書に記載された内容に従い，特定技能雇用契約を締結する。<br>
  <span class="id" style="font-size:7.5pt;">별첨의 고용 조건서에 기재된 내용에 따라 특정 기능 고용 계약을 체결한다.</span>
</div>



<div style="font-size:8.5pt;margin-bottom:6px;">
  本雇用契約は、乙が、在留資格「特定技能１号」若しくは「特定技能２号」の上陸許可又は在留資格変更許可等を受けた日から、甲乙双方が速やかに調整を行い、同日から１か月以内の甲乙双方の合意により定めた日から雇用を開始するものとする。<br>
  <span class="id" style="font-size:7pt;">본 고용계약은 을이 재류자격 「특정기능 1호」 또는 「특정기능 2호」의 상륙허가 또는 재류자격 변경허가 등을 받은 날부터 갑을 쌍방이 신속하게 조정하고, 같은 날로부터 1개월 이내의 갑을 쌍방의 합의로 정한 날부터 고용을 개시하는 것으로 한다.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  雇用条件書に記載の雇用契約期間（雇用契約の始期と終期）は、甲乙双方の調整により定めた雇用を開始する日に伴って変更されるものとする。<br>
  <span class="id" style="font-size:7pt;">고용조건서에 기재된 고용계약기간(고용계약의 시기와 종기)은 갑을 쌍방의 조정에 의해 정한 고용을 개시하는 날에 따라 변경된다.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  甲乙双方は、乙の在留資格に係る審査結果を互いに情報共有することとする。<br>
  <span class="id" style="font-size:7pt;">갑을 쌍방은 을의 재류자격에 관한 심사결과를 서로 정보공유하기로 한다.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  なお，雇用契約を更新することなく雇用契約期間を満了した場合，及び乙が何らかの事由で在留資格を喪失した時点で雇用契約は終了するものとする。<br>
  <span class="id" style="font-size:7pt;">또한 고용계약을 갱신하지 않고 고용계약기간을 만료한 경우 및 을이 어떠한 사유로 재류자격을 상실한 시점에서 고용계약은 종료하는 것으로 한다.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:12px;">
  本雇用契約書及び雇用条件書は２部作成し，甲乙それぞれが保有するものとする。<br>
  <span class="id" style="font-size:7pt;">본 고용계약서 및 고용조건서는 2부 작성하여 갑과 을이 각각 보유한다.</span>
</div>



<!-- 締結日 -->
<div style="text-align:right;font-size:8pt;margin-bottom:10px;line-height:1.8;">
  ${f('es_createY')}　年　${f('es_createM')}　月　${f('es_createD')}　日　締結<br>
  <span class="id" style="font-size:7.5pt;">${f('es_createY')} 년 ${f('es_createM')} 월 ${f('es_createD')} 일 체결</span>
</div>

<!-- 署名欄 -->
<div style="display:flex;font-size:8pt;margin-top:8px;line-height:1.9;">
  <!-- 甲（左カラム）-->
  <div style="flex:1;">
    <div style="margin-left:10em;">${f('es_orgName')}</div>
    <div style="display:flex;align-items:center;"><span style="width:3em;">甲</span><span style="flex:1;"></span><span>${f('es_repTitle')}　${f('es_repName')}</span><span style="flex:1;"></span><span style="width:3em;text-align:right;">印</span></div>
    <div style="height:0.8em;"></div>
    <div style="font-size:7.5pt;">（特定技能所属機関名・代表者役職名・氏名・捺印）</div>
    <div style="height:0.8em;"></div>
    <div style="margin-left:10em;">${f('es_orgNameEn')}</div>
    <div style="display:flex;align-items:center;"><span style="min-width:3em;">갑</span><span style="flex:1;"></span><span>${f('es_repTitleEn')}　${f('es_repNameEn')}</span><span style="flex:1;"></span><span style="min-width:3em;text-align:right;">인</span></div>
    <div style="font-size:7pt;">(특정기능 소속 기관명·<br>대표자 직책명·성명·날인)</div>
  </div>
  <!-- 乙（右カラム）-->
  <div style="flex:1;padding-left:3em;" class="sign-field" data-signer="applicant" data-label="乙署名">
    <div style="line-height:1.9;">&nbsp;</div><!-- orgName行と高さ合わせ -->
    <div>乙
      <div class="sign-field-area" style="height:22px;display:inline-block;min-width:10em;vertical-align:middle;position:relative;border-top:none;margin-top:0;">
        <span class="sign-field-placeholder" style="color:#bbb;font-size:9px;">← 署名</span>
        <img class="sign-field-img" style="display:none;max-height:20px;">
      </div>
    </div>
    <div style="height:0.8em;"></div>
    <div style="font-size:7.5pt;">（特定技能外国人の署名）</div>
    <div style="height:0.8em;"></div>
    <div>&nbsp;</div>
    <div>을</div>
    <div style="font-size:7pt;">(특정기능 외국인의 서명)</div>
  </div>
</div>

</div><!-- /doc -->
`;
  _fontSize=(_fontSize===8.5)?8.5:_fontSize;
  _applyFontSize();
  _apply15_koFontSize();
  setupPageTracker();
}

function _apply15_koFontSize(){
  const st=document.getElementById('_15_koFontStyle')||document.createElement('style');
  st.id='_15_koFontStyle';
  document.head.appendChild(st);
  const s=_fontSize/8.5;
  st.textContent=[
    `.doc [style*="font-size:13pt"]{font-size:${(13*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
  ].join('');
}

p();

// index.htmlからの案件選択を受信（自動追加）
if(!window._selectCaseListenerAdded){
  window._selectCaseListenerAdded=true;
  window.addEventListener('message', function(e){
    if(!e.data||e.data.type!=='SELECT_CASE') return;
    const info=e.data.info;
    if(!info||!info.caseId) return;
    console.log('[doc] SELECT_CASE received:', info);
    const sel=document.getElementById('caseSelect');
    if(sel){
      let found=false;
      for(let o of sel.options){
        try{ const d=JSON.parse(o.value); if(d.caseId===info.caseId){sel.value=o.value;found=true;break;} }catch(e2){}
      }
      if(!found){
        const opt=document.createElement('option');
        opt.value=JSON.stringify(info);
        opt.textContent='（indexから選択）';
        sel.appendChild(opt);
        sel.value=opt.value;
      }
    }
    if(typeof loadFromDB==='function'){ loadFromDB(info); }
    else if(typeof loadCaseToForm==='function'){ loadCaseToForm(info); }
  });
}

</script>
</body>
</html>
