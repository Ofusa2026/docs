<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>参考様式第１－１７号 １号特定技能外国人支援計画書（インドネシア語）</title>
<style>.fp-case{display:none!important;}</style>
<link rel="stylesheet" href="ofusa_common.css?v=1776316942">
<style>
.doc{padding:15mm!important;line-height:1.5!important;min-height:auto!important;font-family:'MS Mincho','Yu Mincho','Hiragino Mincho ProN',serif;}
.id{color:#000;}
.tbl{width:100%;border-collapse:collapse;font-size:10pt;margin-bottom:4mm;}
.tbl td,.tbl th{border:1px solid #000;padding:4px 6px;vertical-align:middle;}
.sec-lbl{width:20px;text-align:center;writing-mode:vertical-rl;font-weight:bold;}
@media print{
  .app-bar,.fp{display:none!important}
  .main{display:block!important}
  .doc{box-shadow:none!important;margin:0!important;padding:15mm!important}
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 参考様式第１－１７号（インドネシア語）　１号特定技能外国人支援計画書【プロト】</div>
    <div class="ver">ver.20260417.01</div>
  </div>
  <div class="bar-btns">
    <button class="btn" id="editModeBtn" onclick="toggleEditMode()" style="background:#7c3aed;color:white;">✏️ 直接編集</button>
    <button class="btn" id="styleModeBtn" onclick="toggleStyleMode()" style="background:#0f766e;color:white;">🎨 スタイル編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>登録支援機関</label><select id="filterOrg" onchange="filterCases()"></select>
    <label>所属機関</label><select id="filterCompany" onchange="filterCases()"></select>
    <label>検索</label><input id="filterText" oninput="filterCases()" placeholder="名前で絞り込み">
    <label>案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">作成日</div>
      <div class="fg"><label>年</label><input id="f_docY" oninput="p()" placeholder="2026"></div>
      <div class="fg"><label>月</label><input id="f_docM" oninput="p()" placeholder="4"></div>
      <div class="fg"><label>日</label><input id="f_docD" oninput="p()" placeholder="17"></div>
    </div>
    <div class="fs"><div class="fs-title">Ⅰ 支援対象者</div>
      <div class="fg"><label>氏名（ローマ字）</label><input id="f_applicantName" oninput="p()" placeholder="TARO YAMADA"></div>
      <div class="fg"><label>ほか何名</label><input id="f_otherCount" oninput="p()" placeholder="0"></div>
      <div class="fg"><label>性別（日）</label>
        <select id="f_gender" onchange="p()">
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <div class="fg"><label>生年月日 年</label><input id="f_birthY" oninput="p()" placeholder="1990"></div>
      <div class="fg"><label>月</label><input id="f_birthM" oninput="p()" placeholder="1"></div>
      <div class="fg"><label>日</label><input id="f_birthD" oninput="p()" placeholder="15"></div>
      <div class="fg"><label>国籍（日）</label><input id="f_nationality" oninput="p()" value="インドネシア"></div>
      <div class="fg"><label>国籍（ID）</label><input id="f_nationalityEn" oninput="p()" value="Indonesia"></div>
    </div>
    <div class="fs"><div class="fs-title">Ⅱ 特定技能所属機関</div>
      <div class="fg"><label>ふりがな</label><input id="f_coNameKana" oninput="p()" placeholder="かぶしきがいしゃ〇〇"></div>
      <div class="fg"><label>機関名（日）</label><input id="f_coName" oninput="p()" placeholder="株式会社〇〇"></div>
      <div class="fg"><label>機関名（英）</label><input id="f_coNameEn" oninput="p()" placeholder="XX Co., Ltd."></div>
      <div class="fg"><label>郵便番号</label><input id="f_coZip" oninput="p()" placeholder="100-0001"></div>
      <div class="fg"><label>住所（日）</label><input id="f_coAddress" oninput="p()" placeholder="東京都〇〇区〇〇1-2-3"></div>
      <div class="fg"><label>住所（英）</label><input id="f_coAddressEn" oninput="p()" placeholder="1-2-3 XX, XX-ku, Tokyo"></div>
      <div class="fg"><label>電話番号</label><input id="f_coTel" oninput="p()" placeholder="03-1234-5678"></div>
    </div>
  </div>
</div>
<div class="pp">
  <div class="page-nav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">10pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776316942"></script>
<script>
docId='1_17';

function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea');
  if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="font-size:10pt;margin-bottom:2px;">参考様式第１－１７号</div>
<div style="font-size:9pt;color:#555;margin-bottom:10mm;">Format Referensi 1-17</div>

<div style="font-size:16pt;font-weight:bold;text-align:center;letter-spacing:0.4em;margin-bottom:4mm;">１号特定技能外国人支援計画書</div>
<div style="font-size:11pt;text-align:center;margin-bottom:6mm;">Rencana Bantuan Pekerja Asing Berketerampilan Khusus 1</div>

<div style="font-size:10pt;text-align:right;margin-bottom:1mm;">作成日：　${f('f_docY')}　年　${f('f_docM')}　月　${f('f_docD')}　日</div>
<div style="font-size:9pt;text-align:right;margin-bottom:4mm;color:#000;">Tanggal dibuat: tanggal ${f('f_docD')} bulan ${f('f_docM')} tahun ${f('f_docY')}</div>

<table class="tbl">
  <colgroup>
    <col style="width:28px;">
    <col style="width:22%;">
    <col>
    <col style="width:16%;">
    <col style="width:22%;">
  </colgroup>
  <tr>
    <td rowspan="2" class="sec-lbl">Ⅰ<br>欄</td>
    <td>
      <div>１　氏　　名</div>
      <div style="font-size:9pt;">1. Nama</div>
    </td>
    <td>
      <div style="text-align:center;">${f('f_applicantName')}　（ほか　${f('f_otherCount')}　名）</div>
      <div style="text-align:right;font-size:9pt;">${f('f_applicantName')}　(Nama lain: ${f('f_otherCount')})</div>
    </td>
    <td>
      <div>２　性　　別</div>
      <div style="font-size:9pt;">2. Jenis kelamin</div>
    </td>
    <td>
      <div style="text-align:center;">${f('f_gender')}</div>
      <div style="text-align:center;font-size:9pt;">${f('f_gender')==='男'?'Laki-laki':'Perempuan'}</div>
    </td>
  </tr>
  <tr>
    <td>
      <div>３　生年月日</div>
      <div style="font-size:9pt;">3. Tanggal lahir</div>
    </td>
    <td>
      <div style="text-align:center;">${f('f_birthY')}　年　${f('f_birthM')}　月　${f('f_birthD')}　日</div>
      <div style="text-align:center;font-size:9pt;">Tanggal ${f('f_birthD')} bulan ${f('f_birthM')} tahun ${f('f_birthY')}</div>
    </td>
    <td>
      <div>４　国籍・地域</div>
      <div style="font-size:9pt;">4. Warga negara, daerah</div>
    </td>
    <td>
      <div>${f('f_nationality')}</div>
      <div style="font-size:9pt;">${f('f_nationalityEn')}</div>
    </td>
  </tr>
</table>

<table class="tbl">
  <colgroup>
    <col style="width:28px;">
    <col style="width:22%;">
    <col>
  </colgroup>
  <tr>
    <td rowspan="2" class="sec-lbl">Ⅱ<br>欄</td>
    <td>
      <div style="font-size:9pt;">（ふりがな）(Furigana)</div>
      <div>１　氏名又は名称</div>
      <div style="font-size:9pt;">1. Nama atau panggilan</div>
    </td>
    <td>
      <div style="border-bottom:1px dotted #888;padding-bottom:2px;font-size:9pt;color:#555;">${f('f_coNameKana')}</div>
      <div style="border-bottom:1px solid #000;padding:4px 0;font-weight:bold;">${f('f_coName')}</div>
      <div style="padding-top:4px;font-size:9pt;">${f('f_coNameEn')}</div>
    </td>
  </tr>
  <tr>
    <td>
      <div>２　住　　所</div>
      <div style="font-size:9pt;">2. Alamat</div>
    </td>
    <td>
      <div>〒 ${f('f_coZip')}</div>
      <div style="font-size:9pt;">Kode pos: ${f('f_coZip')}</div>
      <div style="margin-top:2mm;">${f('f_coAddress')}</div>
      <div style="font-size:9pt;">${f('f_coAddressEn')}</div>
      <div style="text-align:right;margin-top:2mm;">（電話　${f('f_coTel')}）</div>
      <div style="text-align:right;font-size:9pt;">(Telepon　${f('f_coTel')})</div>
    </td>
  </tr>
</table>

</div><!-- /doc -->
`;
  _fontSize = (_fontSize === 8.5) ? 10 : _fontSize;
  _applyFontSize();
  _apply1_17FontSize();
  const lbl=document.getElementById('fontSizeLabel');if(lbl)lbl.textContent=_fontSize+'pt';
  setupPageTracker();
  fitDocToPreview();
}

function _apply1_17FontSize(){
  const st=document.getElementById('_1_17FontStyle')||document.createElement('style');
  st.id='_1_17FontStyle'; document.head.appendChild(st);
  const s=_fontSize/10;
  st.textContent=[
    `.doc [style*="font-size:16pt"]{font-size:${(16*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:11pt"]{font-size:${(11*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:10pt"]{font-size:${(10*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
  ].join('');
}

function fitDocToPreview(){
  // no-op
}

// プレースホルダデータで初期表示
(function initDefaults(){
  const defaults = {
    f_docY:'2026', f_docM:'4', f_docD:'17',
    f_applicantName:'TARO YAMADA', f_otherCount:'0',
    f_gender:'男', f_birthY:'1990', f_birthM:'1', f_birthD:'15',
    f_nationality:'インドネシア', f_nationalityEn:'Indonesia',
    f_coNameKana:'かぶしきがいしゃ〇〇', f_coName:'株式会社〇〇',
    f_coNameEn:'XX Co., Ltd.',
    f_coZip:'100-0001', f_coAddress:'東京都千代田区〇〇1-2-3',
    f_coAddressEn:'1-2-3 XX, Chiyoda-ku, Tokyo',
    f_coTel:'03-1234-5678',
  };
  Object.keys(defaults).forEach(k=>{
    const el=document.getElementById(k);
    if(el && !el.value) el.value = defaults[k];
  });
})();

p();
</script>
</body>
</html>
