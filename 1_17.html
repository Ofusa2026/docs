// normalizeCoName (index.html 29274-29281)
function normalizeCoName(s) {
  try { s = (s||'').normalize('NFKC'); } catch(e) {}
  return s.replace(/　/g, ' ')
           .replace(/\s*&\s*/g, '&')
           .replace(/\s+/g, ' ')
           .trim();
}

// findCompanyByName (index.html 29282-29293)
function findCompanyByName(name, companyId) {
  if (!name && !companyId) return null;
  if (companyId) {
    var byId = companies.find(function(x){ return x.id === companyId; });
    if (byId) return byId;
  }
  if (!name) return null;
  var n = normalizeCoName(name);
  return companies.find(function(x){ return normalizeCoName(x.name) === n; }) || null;
}

// splitAddress (index.html 6684-6695)
function splitAddress(str) {
  if (!str) return {pref:'', city:'', rest:''};
  var prefPattern = /^(北海道|東京都|(?:京都|大阪)府|.{2,3}県)/;
  var pm = str.match(prefPattern);
  var pref = pm ? pm[1] : '';
  var rest1 = pm ? str.substring(pref.length) : str;
  var cityPattern = /^(.+?[市区町村郡])/;
  var cm = rest1.match(cityPattern);
  var city = cm ? cm[1] : '';
  var rest = cm ? rest1.substring(city.length) : rest1;
  return {pref: pref, city: city, rest: rest};
}

// getDisplayName (index.html 22370-22373)
function getDisplayName(cas) {
  var pd = personData[cas.id] || {};
  return pd.applicantNameEn || pd.applicantName || cas.applicant || cas.name || '';
}

// sanitizeStoragePath: 簡易版（index.htmlの実装は複雑なのでシンプル化）
function sanitizeStoragePath(path){
  if(!path) return path;
  // スペースや特殊文字をURL-safeに
  return path.split('/').map(function(seg){
    return encodeURIComponent(seg).replace(/'/g,'%27');
  }).join('/');
}

async function loadCaseById(caseId, companyId){
  if(!_sb) throw new Error("Supabase未接続");
  log("案件取得: " + caseId);

  // 案件本体
  var caseRes = await _sb.from("cases").select("*").eq("id", caseId).single();
  if(caseRes.error) throw new Error("案件取得失敗: " + caseRes.error.message);
  var cRow = caseRes.data;

  // 企業（companyId指定があればそれで、なければorg名で）
  var coRow = null;
  if(companyId){
    var r = await _sb.from("companies").select("*").eq("id", companyId).single();
    if(!r.error) coRow = r.data;
  }
  if(!coRow && cRow.company){
    var r2 = await _sb.from("companies").select("*").eq("name", cRow.company).limit(1);
    if(!r2.error && r2.data && r2.data.length) coRow = r2.data[0];
  }
  if(!coRow && cRow.org){
    var r3 = await _sb.from("companies").select("*").eq("name", cRow.org).limit(1);
    if(!r3.error && r3.data && r3.data.length) coRow = r3.data[0];
  }

  // 人材
  var pRes = await _sb.from("persons").select("*").eq("case_id", caseId).limit(1);
  var pRow = (pRes.data && pRes.data.length) ? pRes.data[0] : null;

  // 支援機関（案件のorg名で引く）
  var soRow = null;
  if(cRow.org){
    var so = await _sb.from("support_orgs").select("*").eq("name", cRow.org).limit(1);
    if(!so.error && so.data && so.data.length) soRow = so.data[0];
  }

  // グローバル配列/オブジェクトに格納（既存データを上書き）
  var caseObj = dbRowToCase(cRow);
  // 同じIDがあれば入れ替え、なければ追加
  var idx = cData.findIndex(function(x){ return x.id === caseId; });
  if(idx >= 0) cData[idx] = caseObj; else cData.push(caseObj);

  if(coRow){
    var coObj = dbRowToCompany(coRow);
    var cIdx = companies.findIndex(function(x){ return x.id === coObj.id; });
    if(cIdx >= 0) companies[cIdx] = coObj; else companies.push(coObj);
  }
  if(pRow){
    personData[caseId] = Object.assign(personData[caseId]||{}, dbRowToPerson(pRow));
  }
  if(soRow){
    var soObj = dbRowToSupportOrg(soRow);
    var sIdx = supportOrgs.findIndex(function(x){ return x.id === soObj.id; });
    if(sIdx >= 0) supportOrgs[sIdx] = soObj; else supportOrgs.push(soObj);
  }

  log("案件データ取得完了: " + (pRow && pRow.applicant_name_en || caseObj.applicant || caseId));
  return caseObj;
}
</script>

// run分割されたプレースホルダーを修復して置換
function fixSplitPlaceholders(xml, phMap, rv){
  // 全w:tノード（開閉タグ + self-closing）の位置を記録
  var tNodes=[];
  var re=/<w:t(?=[ >\/])((?:[^>]*[^\/])?)>([\s\S]*?)<\/w:t>|<w:t\/>/g;
  var m;
  while((m=re.exec(xml))!==null){
    if(m[2]!==undefined){
      // 開閉タグ: <w:t attr>text</w:t>
      tNodes.push({start:m.index, end:m.index+m[0].length, text:m[2], selfClose:false});
    } else {
      // self-closing: <w:t/>
      tNodes.push({start:m.index, end:m.index+m[0].length, text:'', selfClose:true});
    }
  }
  if(!tNodes.length) return xml;

  // 結合テキストとオフセットマップ構築
  var concat='';
  var offsetMap=[];
  for(var i=0;i<tNodes.length;i++){
    for(var j=0;j<tNodes[i].text.length;j++) offsetMap.push(i);
    concat+=tNodes[i].text;
  }

  // プレースホルダー検出
  var replacements=[];
  // PLACEHOLDER_MAPキー（日本語形式）
  Object.keys(phMap).forEach(function(k){
    if(typeof phMap[k] !== 'string') return; // 関数型など非文字列は無視
    var val=rv(phMap[k]);
    var escaped=String(val).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    ['{{ '+k+' }}','{{ '+k+'}}','{{'+k+' }}','{{'+k+'}}',
      '｛｛'+k+'｝｝','｛｛ '+k+'｝｝','｛｛'+k+' ｝｝'].forEach(function(v){
      var pos=0;
      while((pos=concat.indexOf(v,pos))>=0){
        replacements.push({start:pos,end:pos+v.length,value:escaped});
        pos+=v.length;
      }
    });
  });
  // 直接変数形式（{{es.xxx}} {{p.xxx}} 等）をconcatからスキャンして追加
  var directRe=/\{\{([^}\n]+)\}\}/g, dm;
  while((dm=directRe.exec(concat))!==null){
    var dk=dm[1].trim();
    // PLACEHOLDER_MAPに既にある場合はスキップ（重複処理防止）
    if(phMap[dk]) continue;
    var dval=rv(dk);
    var descaped=String(dval).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    replacements.push({start:dm.index,end:dm.index+dm[0].length,value:descaped});
  }
  if(!replacements.length) return xml;

  // ソート＆重複除去
  replacements.sort(function(a,b){return a.start-b.start;});
  var unique=[],lastEnd=-1;
  replacements.forEach(function(r){if(r.start>=lastEnd){unique.push(r);lastEnd=r.end;}});
  replacements=unique;

  // 影響を受けるノードを特定
  var affected={};
  replacements.forEach(function(r){
    for(var ci=r.start;ci<r.end&&ci<offsetMap.length;ci++) affected[offsetMap[ci]]=true;
  });

  // 影響ノードの新テキスト計算
  var nodeNew={};
  Object.keys(affected).forEach(function(k){nodeNew[k]='';});
  var ci=0,ri=0;
  while(ci<concat.length){
    if(ri<replacements.length&&ci===replacements[ri].start){
      var r=replacements[ri];
      nodeNew[offsetMap[ci]]+=r.value;
      ci=r.end; ri++;
    } else {
      if(affected[offsetMap[ci]]) nodeNew[offsetMap[ci]]+=concat[ci];
      ci++;
    }
  }

  // 影響ノードのみXMLを書き換え（後ろから）
  var result=xml;
  for(var i2=tNodes.length-1;i2>=0;i2--){
    if(!affected[i2]) continue;
    var tn=tNodes[i2];
    var newXml='<w:t xml:space="preserve">'+(nodeNew[i2]||'')+'</w:t>';
    result=result.substring(0,tn.start)+newXml+result.substring(tn.end);
  }
  return result;
}

/* === ここまで === */
</script>

<!-- ========= UI / アプリロジック ========= -->
<script>
/* ==========================================================
   テンプレート一覧
   ========================================================== */
var allTemplates = []; // public.templatesの全行

// 1-17号固定のグループ名
const TARGET_GROUP = "1-17(支援計画書)";

async function loadTemplates(){
  if(!_sb) return;
  var res = await _sb.from("templates")
    .select("*")
    .eq("group_name", TARGET_GROUP)
    .order("name");
  if(res.error){
    setStatus("テンプレート取得失敗: " + res.error.message, "error");
    return;
  }
  allTemplates = res.data || [];
  log("1-17テンプレート: " + allTemplates.length + "件");

  if(allTemplates.length === 0){
    setStatus("⚠ "+TARGET_GROUP+" のテンプレートがDBに登録されていません。", "error");
    return;
  }

  // 初期表示: 全件を並べる
  refreshTemplateList();
}

function refreshTemplateList(){
  var kind = $("selKind").value;
  var sel  = $("selTemplate");

  var list = allTemplates.filter(function(t){
    if(kind){
      var hay = (t.kind||"") + " " + (t.name||"") + " " + (t.filename||"");
      if(hay.indexOf(kind) < 0) return false;
    }
    return true;
  });
  _currentTplList = list; // processTemplateBytesから参照
  sel.innerHTML = list.length
    ? '<option value="">-- テンプレートを選択 --</option>' + list.map(function(t,i){
        return '<option value="'+i+'">'+esc(t.name||t.filename||t.storage_path)+'</option>';
      }).join("")
    : '<option value="">該当なし</option>';
  updateGenerateBtn();
}

/* ==========================================================
   案件受信（index.html からの postMessage）
   ========================================================== */
var currentCase = null;       // 選択中の案件オブジェクト
var currentEmpSetIdx = "";    // index.html から渡された雇用条件セットインデックス

window.addEventListener("message", async function(e){
  var d = e.data;
  if(!d || d.type !== "SELECT_CASE" || !d.info) return;
  var info = d.info;
  log("SELECT_CASE受信: " + JSON.stringify({
    caseId: info.caseId, companyId: info.companyId, empSetIdx: info.empSetIdx
  }));
  try {
    setStatus("案件データ取得中...", "info");
    await loadCaseById(info.caseId, info.companyId);
    currentCase = cData.find(function(x){ return x.id === info.caseId; });
    currentEmpSetIdx = (info.empSetIdx != null && info.empSetIdx !== "")
      ? String(info.empSetIdx)
      : (currentCase && currentCase.empSetIdx != null ? String(currentCase.empSetIdx) : "0");
    renderCaseInfo();
    updateGenerateBtn();
    setStatus("案件読み込み完了。テンプレートを選んでください。", "success");
  } catch(err) {
    console.error(err);
    log("ERROR: " + err.message);
    setStatus("案件読み込みエラー: " + err.message, "error");
  }
});

function renderCaseInfo(){
  if(!currentCase){
    $("caseInfoEmpty").style.display = "block";
    $("caseInfoDl").style.display = "none";
    return;
  }
  var c = currentCase;
  var pd = personData[c.id] || {};
  var co = findCompanyByName(c.company, c.companyId) || findCompanyByName(c.org) || {};
  var empSetLabel = "(なし)";
  if(co.empSets && co.empSets.length){
    var idx = parseInt(currentEmpSetIdx, 10) || 0;
    var es = co.empSets[idx];
    if(es) empSetLabel = "#" + idx + " : " + (es.name || es.label || ("セット"+(idx+1)));
  }
  var dl = $("caseInfoDl");
  dl.innerHTML = [
    ["案件番号", c._caseNo || "(なし)"],
    ["外国人氏名", getDisplayName(c) || "?"],
    ["国籍", c.nationality || pd.nationality || "?"],
    ["企業名", c.company || "?"],
    ["支援機関", c.org || "(なし)"],
    ["雇用条件セット", empSetLabel]
  ].map(function(kv){ return "<dt>"+esc(kv[0])+"</dt><dd>"+esc(kv[1])+"</dd>"; }).join("");
  $("caseInfoEmpty").style.display = "none";
  dl.style.display = "grid";
}

/* ==========================================================
   生成ボタン
   ========================================================== */
function updateGenerateBtn(){
  var ok = $("selTemplate").value !== "" && currentCase != null;
  $("btnGenerate").disabled = !ok;
}

async function onGenerate(){
  clearLog();
  var btn = $("btnGenerate");
  btn.disabled = true;
  setStatus("生成中...", "info");
  try {
    var tplIdxStr = $("selTemplate").value;
    if(tplIdxStr === "") throw new Error("テンプレート未選択");
    var tpl = _currentTplList[parseInt(tplIdxStr, 10)];
    if(!tpl) throw new Error("テンプレート取得失敗");
    if(!tpl.storage_path) throw new Error("テンプレートのstorage_pathがDBにセットされていません");

    var caseId = currentCase && currentCase.id;
    if(!caseId) throw new Error("案件未選択（index.html左サイドバーで案件を選んでください）");
    var empSetIdx = currentEmpSetIdx || "";

    // グローバル選択状態をセット（processTemplateBytesが参照）
    _selectedDocType = tpl.group_name || "";
    _selectedTplRef  = {
      name: tpl.name || tpl.filename || "",
      storagePath: tpl.storage_path
    };
    _selectedTplIdx  = parseInt(tplIdxStr, 10);

    // ファイル名ベースをテンプレート名にしたいので、TEMPLATE_CATEGORIESに現在選択用エントリを1つ作る
    TEMPLATE_CATEGORIES = [{
      name: tpl.group_name || "",
      templates: _currentTplList.map(function(t){
        return { name: t.name || t.filename, filename: t.filename || t.name };
      })
    }];

    // Storageからテンプレートを直接ダウンロードして processTemplateBytes を呼ぶ
    // （doGenerateFromMappingの分岐回避: bytesOverride経由）
    log("Storage取得: " + tpl.storage_path);
    var dlRes = await _sb.storage.from("templates").download(tpl.storage_path);
    if(dlRes.error || !dlRes.data){
      // sanitizedパスで再試行
      var safe = sanitizeStoragePath(tpl.storage_path);
      if(safe !== tpl.storage_path){
        log("再試行 (sanitized): " + safe);
        dlRes = await _sb.storage.from("templates").download(safe);
      }
    }
    if(dlRes.error || !dlRes.data){
      throw new Error("Storageダウンロード失敗: " + (dlRes.error && dlRes.error.message));
    }
    var ab = await dlRes.data.arrayBuffer();
    var bytes = new Uint8Array(ab);

    log("変数置換開始 (" + bytes.byteLength + " bytes)");
    // doGenerateFromMapping は bytesOverride 経由で processTemplateBytes を呼ぶ
    doGenerateFromMapping(caseId, empSetIdx, [], bytes);

    setStatus("✅ 生成完了（ダウンロードフォルダを確認してください）", "success");
  } catch(e) {
    console.error(e);
    log("ERROR: " + e.message);
    setStatus("❌ " + e.message, "error");
  } finally {
    updateGenerateBtn();
  }
}

/* ==========================================================
   イベント登録
   ========================================================== */
$("selKind").addEventListener("change",  refreshTemplateList);
$("selTemplate").addEventListener("change", updateGenerateBtn);
$("btnGenerate").addEventListener("click", onGenerate);

/* ==========================================================
   起動
   ========================================================== */
(async function init(){
  if(!_sb){
    setStatus("⚠ Supabase接続に失敗しました。", "error");
    return;
  }
  try {
    await loadTemplates();
    setStatus("テンプレート読み込み完了。案件を選択してください（index.htmlサイドバー上部）。", "info");
    // 親ページに「準備完了」通知（親が既に案件選択済みなら再送信を促したい場合用）
    try { window.parent && window.parent !== window && window.parent.postMessage({type:"CHILD_READY", child:"1_17"}, "*"); } catch(e){}
  } catch(e) {
    console.error(e);
    setStatus("初期化エラー: " + e.message, "error");
  }
})();
</script>
</body>
</html>
