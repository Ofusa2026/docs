function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp=document.querySelector('.pp');
    const area=document.getElementById('pageArea');
    if(!pp||!area) return;
    const ppW=pp.clientWidth-40; const docW=794;
    if(ppW<docW){const scale=ppW/docW;area.querySelectorAll('.doc').forEach(d=>{d.style.zoom=scale;});}
    else{area.querySelectorAll('.doc').forEach(d=>{d.style.zoom=1;});}
  });
}
window.addEventListener('resize', fitDocToPreview);

async function loadFromDB(){

  if(!sel||!sel.value) return;

  const {caseId,companyId,companyName}=info;

    const cos=await sb(q); const co=cos&&cos[0]; if(!co) return;

    s('f_company',co.name||'');
    s('f_author',[co.author_title,co.author_name].filter(Boolean).join('　'));
    s('f_salesY1',co.sales_y1||'');s('f_salesY2',co.sales_y2||'');s('f_salesY3',co.sales_y3||'');
    s('f_plY1',co.ordinary_pl_y1||'');s('f_plY2',co.ordinary_pl_y2||'');s('f_plY3',co.ordinary_pl_y3||'');
    s('f_netY1',co.net_pl_y1||'');s('f_netY2',co.net_pl_y2||'');s('f_netY3',co.net_pl_y3||'');
    s('f_assetsY1',co.net_assets_y1||'');s('f_assetsY2',co.net_assets_y2||'');s('f_assetsY3',co.net_assets_y3||'');
    s('f_jpVQ',co.jp_voluntary_quit||'');s('f_jpIQ',co.jp_involuntary_quit||'');
    s('f_fgnVQ',co.fgn_voluntary_quit||'');s('f_fgnIQ',co.fgn_involuntary_quit||'');
    const officers=Array.isArray(co.officers)?co.officers:[];
    officers.forEach((o,i)=>{if(i>=10)return;s(`off${i+1}Kana`,o.kana||o.name_kana||'');s(`off${i+1}Name`,o.name||'');s(`off${i+1}Title`,o.title||'');});
    if(!v('f_docDate')){const n=new Date();document.getElementById('f_docDate').value=`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`;}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);console.error(e);}
}

window.addEventListener('message', function(e){
  if(!e.data||e.data.type!=='SELECT_CASE') return;
  const info=e.data.info; if(!info||!info.caseId) return;
  const sel=document.getElementById('caseSelect');
  if(sel){
    let found=false;
    for(let o of sel.options){try{const d=JSON.parse(o.value);if(d.caseId===info.caseId){sel.value=o.value;found=true;break;}}catch(e2){}}
    if(!found){const opt=document.createElement('option');opt.value=JSON.stringify(info);opt.textContent='（indexから選択）';sel.appendChild(opt);sel.value=opt.value;}
  }
  if(typeof loadFromDB==='function') loadFromDB();
});

initCaseSelect(); p();
</script>
