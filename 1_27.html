<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>参考様式第１－２７号</title>
<style>.fp-case{display:none!important;}</style>
<link rel="stylesheet" href="ofusa_common.css?v=1776264504">
<style>
.doc{padding:15mm!important;line-height:1.52!important}
@media print{
  .app-bar,.fp{display:none!important}
  .main{display:block!important}
  .doc{box-shadow:none!important;margin:0!important;padding:15mm!important}
  .f[style*="color:#aaa"]{visibility:hidden}
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 参考様式第１－２７号　公的義務履行に関する説明書</div>
    <div class="ver">ver.20260415.16</div>
  </div>
  <div class="bar-btns">
    <button class="btn" id="editModeBtn" onclick="toggleEditMode()" style="background:#7c3aed;color:white;">✏️ 直接編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn" onclick="sendSignRequest()" style="background:#b45309;color:white;">✉️ 署名依頼</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>登録支援機関</label><select id="filterOrg" onchange="filterCases()"></select>
    <label>所属機関</label><select id="filterCompany" onchange="filterCases()"></select>
    <label>検索</label><input id="filterText" oninput="filterCases()" placeholder="名前で絞り込み">
    <label>案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">基本情報</div>
      <div class="fg"><label>書類作成日</label><input id="f_docDate" oninput="p()"></div>
      <div class="fg"><label>所属機関名</label><input id="f_company" oninput="p()"></div>
    </div>
    <div style="font-size:9px;color:#888;font-family:sans-serif;padding:4px 6px;">※ほぼ固定文。機関名と日付のみ入力。</div>
  </div>
</div>
<div class="pp">
  <div class="page-nav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">14pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776264504"></script>
<script>
function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea'); if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="text-align:left;font-size:7pt;margin-bottom:2mm;">参考様式第１－２７号</div>
<div style="font-weight:bold;text-align:center;margin:4mm 0;">公的義務履行に関する説明書</div>
<div style="margin-bottom:8px;">第１　労働関係法令の遵守</div>
<div style="margin-left:2em;margin-bottom:8px;">労働保険料（適用事業所のみ）</div>
<div style="margin-bottom:8px;">第２　社会保険関係法令の遵守</div>
<div style="margin-left:2em;margin-bottom:8px;">
１　健康保険・厚生年金保険の適用事業所の場合<br>
<div style="margin-left:2em;">健康保険・厚生年金保険料</div>
２　健康保険・厚生年金保険の適用事業所の場合ではない場合<br>
<div style="margin-left:2em;">（１）事業主の国民健康保険料<br>（２）事業主の国民年金保険料</div>
</div>
<div style="margin-bottom:8px;">第３　租税関係の法令遵守</div>
<div style="margin-left:2em;margin-bottom:8px;">
１　法人の場合<br>
<div style="margin-left:2em;">（１）国税（源泉所得税及び復興特別所得税、法人税、消費税及び地方消費税）<br>（２）地方税（法人住民税）</div>
２　個人事業主の場合<br>
<div style="margin-left:2em;">（１）国税（源泉所得税及び復興特別所得税、消費税及び地方消費税、相続税、贈与税）<br>（２）地方税（個人住民税）</div>
</div>
<div style="margin-bottom:8px;">以上のいずれについても、滞納はありません。</div>
<div style="margin-bottom:8px;">なお、地方出入国在留管理局から、納付したことの証明を求められた場合には指導に従って関係書類を提出します。</div>
<div style="margin-bottom:16px;">また、以上の説明が虚偽であった場合には、入管法令に関し不正又は著しい不当な行為をしたものとして５年間の受入れができないこととなることも理解しています。</div>
<div style="text-align:right;margin-bottom:4px;">${f('f_docDate')}</div>
<div style="text-align:right;">特定技能所属機関名　　　　${f('f_company')}</div>
</div>`;
  _fontSize = (_fontSize === 8.5) ? 14 : _fontSize;
  _applyFontSize();
  const lbl=document.getElementById('fontSizeLabel');if(lbl)lbl.textContent=_fontSize+'pt';
  setupPageTracker();
  fitDocToPreview();
}
async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info; try{info=JSON.parse(sel.value);}catch(e){return;}
  const {companyId,companyName}=info;
  try{
    const q=companyId?`companies?select=name&id=eq.${companyId}`:companyName?`companies?select=name&name=eq.${encodeURIComponent(companyName)}`:null;
    if(!q) return;
    const cos=await sb(q); const co=cos&&cos[0]; if(!co) return;
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    s('f_company',co.name||'');
    if(!v('f_docDate')){const n=new Date();document.getElementById('f_docDate').value=`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`;}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);}
}
initCaseSelect(); p();

function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp = document.querySelector('.pp');
    const area = document.getElementById('pageArea');
    if(!pp || !area) return;
    const ppW = pp.clientWidth - 40;
    const docW = 794;
    if(ppW < docW){
      const scale = ppW / docW;
      area.querySelectorAll('.doc').forEach(d=>{
        d.style.zoom = scale;
      });
    } else {
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = 1; });
    }
  });
}
window.addEventListener('resize', fitDocToPreview);

// index.htmlからの案件選択を受信
window.addEventListener('message', function(e){
  if(!e.data||e.data.type!=='SELECT_CASE') return;
  const info=e.data.info;
  if(!info||!info.caseId) return;
  // caseSelectに値をセットしてloadFromDB()を呼ぶ
  const sel=document.getElementById('caseSelect');
  if(sel){
    // 既存のoptionを探すかなければ追加
    let found=false;
    for(let o of sel.options){
      try{
        const d=JSON.parse(o.value);
        if(d.caseId===info.caseId){sel.value=o.value;found=true;break;}
      }catch(e2){}
    }
    if(!found){
      const opt=document.createElement('option');
      opt.value=JSON.stringify(info);
      opt.textContent='（indexから選択）';
      sel.appendChild(opt);
      sel.value=opt.value;
    }
  }
  if(typeof loadFromDB==='function') loadFromDB();
});
</script>
</body>
</html>
