<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>分野参考様式第１－２号（介護）</title>
<style>.fp-case{display:none!important;}</style>
<link rel="stylesheet" href="ofusa_common.css?v=1776316942">
<style>
.doc{padding:15mm!important;line-height:1.4!important;min-height:auto!important}
.tbl{width:100%;border-collapse:collapse;font-size:10.5pt;}
.tbl td,.tbl th{border:1px solid #000;padding:3px 5px;vertical-align:top;}
@media print{
  .app-bar,.fp{display:none!important}
  .main{display:block!important}
  .doc{box-shadow:none!important;margin:0!important;padding:15mm!important}
  .f[style*="color:#aaa"]{visibility:hidden}
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 分野参考様式第１－２号（介護）　事業所の概要書</div>
    <div class="ver">ver.20260417.86</div>
  </div>
  <div class="bar-btns">
    <button class="btn" id="editModeBtn" onclick="toggleEditMode()" style="background:#7c3aed;color:white;">✏️ 直接編集</button>
    <button class="btn" id="styleModeBtn" onclick="toggleStyleMode()" style="background:#0f766e;color:white;">🎨 スタイル編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn" onclick="sendSignRequest()" style="background:#b45309;color:white;">✉️ 署名依頼</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>登録支援機関</label><select id="filterOrg" onchange="filterCases()"></select>
    <label>所属機関</label><select id="filterCompany" onchange="filterCases()"></select>
    <label>検索</label><input id="filterText" oninput="filterCases()" placeholder="名前で絞り込み">
    <label>案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">基本情報</div>
      <div class="fg"><label>書類作成日</label><input id="f_docDate" oninput="p()"></div>
      <div class="fg"><label>作成責任者</label><input id="f_author" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">事業所情報</div>
      <div class="fg"><label>事業所名ふりがな</label><input id="f_officeNameKana" oninput="p()"></div>
      <div class="fg"><label>事業所の名称</label><input id="f_officeName" oninput="p()"></div>
      <div class="fg"><label>現在受入中の特定技能1号数</label><input id="f_currentTokutei" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">介護職員数（日本人等の常勤）</div>
      <div class="fg"><label>合計人数</label><input id="f_staffTotal" oninput="p()"></div>
      <div class="fg"><label>日本人</label><input id="f_staffJp" oninput="p()"></div>
      <div class="fg"><label>介護福祉士国家試験合格EPA</label><input id="f_staffEpa" oninput="p()"></div>
      <div class="fg"><label>在留資格「介護」</label><input id="f_staffKaigo" oninput="p()"></div>
      <div class="fg"><label>身分・地位在留資格</label><input id="f_staffMibun" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">その他特記事項</div>
      <div class="fg"><textarea id="f_remarks" oninput="p()" rows="4"></textarea></div>
    </div>
  </div>
</div>
<div class="pp">
  <div class="page-nav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">10.5pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776316942"></script>
<script>
function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea'); if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="text-align:left;font-size:10.5pt;margin-bottom:4px;">分野参考様式第１－２号</div>
<div style="font-size:14pt;font-weight:bold;text-align:center;margin:4mm 0;">介護分野における業務を行わせる事業所の概要書</div>

<div style="font-size:11pt;margin-bottom:2mm;">１　事業所の概要</div>
<table class="tbl" style="margin-bottom:4mm;">
  <tr>
    <td style="width:32%;">
      （ふりがな）<br>
      <span style="font-size:9pt;color:#666;">${f('f_officeNameKana')}</span><br>
      ① 事業所の名称
    </td>
    <td colspan="4">${f('f_officeName')}</td>
  </tr>
  <tr>
    <td>② 現在受け入れている１号特定技能外国人の数</td>
    <td colspan="4">${f('f_currentTokutei')}　人</td>
  </tr>
  <tr>
    <td rowspan="3">③ 日本人等の常勤の介護職員の数</td>
    <td colspan="4">計　${f('f_staffTotal')}　人</td>
  </tr>
  <tr>
    <td style="width:17%;text-align:center;">日本人</td>
    <td style="width:17%;text-align:center;">介護福祉士国家試験に合格したEPA介護福祉士</td>
    <td style="width:17%;text-align:center;">在留資格「介護」により在留する者</td>
    <td style="width:17%;text-align:center;">永住者や日本人の配偶者など，身分・地位に基づく在留資格により在留する者</td>
  </tr>
  <tr>
    <td style="text-align:center;">${f('f_staffJp')}　人</td>
    <td style="text-align:center;">${f('f_staffEpa')}　人</td>
    <td style="text-align:center;">${f('f_staffKaigo')}　人</td>
    <td style="text-align:center;">${f('f_staffMibun')}　人</td>
  </tr>
</table>

<div style="font-size:9.5pt;margin-bottom:4mm;">
  <div style="margin-bottom:1mm;">（注意）</div>
  <div style="text-indent:-1.5em;padding-left:1.5em;margin-bottom:1mm;">１　特定技能外国人が実際に業務に従事する事業所（施設・事業）について記載すること。</div>
  <div style="text-indent:-1.5em;padding-left:1.5em;margin-bottom:1mm;">２　１号特定技能外国人の人数枠の算定基準に含まれる介護職員とは、「介護等を主たる業務として行う常勤職員」を指し、介護施設の事務職員や就労支援を行う職員、看護業務を行う看護師及び准看護師はこれに含まれない。</div>
  <div style="padding-left:1.5em;">一方、医療機関において、看護師や准看護師の指導の下に療養生活上の世話（食事、清潔、排泄、入浴、移動等）等を行う診療報酬上の看護補助者や、当該看護補助者の指導を同一病棟で行っている看護師及び准看護師は、算定基準に含まれる。</div>
</div>

<div style="font-size:11pt;margin-bottom:2mm;">２　その他特記事項</div>
<div style="border:1px solid #000;min-height:30mm;padding:3mm 4mm;font-size:10.5pt;margin-bottom:5mm;white-space:pre-wrap;">${f('f_remarks')}</div>

<div style="font-size:10.5pt;margin-bottom:4mm;">上記の記載内容は，事実と相違ありません。</div>
<div style="font-size:10.5pt;margin-bottom:2mm;text-align:right;">作成年月日　${f('f_docDate')}</div>
<div style="font-size:10.5pt;text-align:right;">作成責任者　${f('f_author')}</div>
</div>`;
  _fontSize = (_fontSize === 8.5) ? 10.5 : _fontSize;
  _applyFontSize();
  _apply1_2FontSize();
  const lbl=document.getElementById('fontSizeLabel');if(lbl)lbl.textContent=_fontSize+'pt';
  setupPageTracker();
  fitDocToPreview();
}
function _apply1_2FontSize(){
  const st=document.getElementById('_1_2FontStyle')||document.createElement('style');
  st.id='_1_2FontStyle'; document.head.appendChild(st);
  const s=_fontSize/10.5;
  st.textContent=[
    `.doc [style*="font-size:14pt"]{font-size:${(14*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:11pt"]{font-size:${(11*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:10.5pt"]{font-size:${(10.5*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9.5pt"]{font-size:${(9.5*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
    `.tbl{font-size:${(10.5*s).toFixed(2)}pt!important}`,
  ].join('');
}
async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info; try{info=JSON.parse(sel.value);}catch(e){return;}
  const {caseId,companyId,companyName}=info;
  try{
    const cos=companyId?await sb(`companies?select=name,author_name,author_title&id=eq.${companyId}`)
      :companyName?await sb(`companies?select=name,author_name,author_title&name=eq.${encodeURIComponent(companyName)}`):[];
    const co=cos&&cos[0];
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(co){
      s('f_officeName',co.name||'');
      s('f_author',[co.author_title,co.author_name].filter(Boolean).join('　'));
    }
    if(!v('f_docDate')){const n=new Date();document.getElementById('f_docDate').value=`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`;}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);console.error(e);}
}
initCaseSelect(); p();

function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp = document.querySelector('.pp');
    const area = document.getElementById('pageArea');
    if(!pp || !area) return;
    const ppW = pp.clientWidth - 40;
    const docW = 794;
    if(ppW < docW){
      const scale = ppW / docW;
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = scale; });
    } else {
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = 1; });
    }
  });
}
window.addEventListener('resize', fitDocToPreview);

window.addEventListener('message', function(e){
  if(!e.data||e.data.type!=='SELECT_CASE') return;
  const info=e.data.info;
  if(!info||!info.caseId) return;
  const sel=document.getElementById('caseSelect');
  if(sel){
    let found=false;
    for(let o of sel.options){
      try{
        const d=JSON.parse(o.value);
        if(d.caseId===info.caseId){sel.value=o.value;found=true;break;}
      }catch(e2){}
    }
    if(!found){
      const opt=document.createElement('option');
      opt.value=JSON.stringify(info);
      opt.textContent='（indexから選択）';
      sel.appendChild(opt);
      sel.value=opt.value;
    }
  }
  if(typeof loadFromDB==='function') loadFromDB();
});
</script>
</body>
</html>
