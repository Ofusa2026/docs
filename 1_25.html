<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>参考様式第１－２５号</title>
<link rel="stylesheet" href="ofusa_common.css?v=1776264504">
<style>
.doc{padding:15mm!important;line-height:1.52!important}
@media print{
  .app-bar,.fp{display:none!important}
  .main{display:block!important}
  .doc{box-shadow:none!important;margin:0!important;padding:15mm!important}
  .f[style*="color:#aaa"]{visibility:hidden}
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 参考様式第１－２５号　登録支援機関との支援委託契約に関する説明書</div>
    <div class="ver">ver.20260415.13</div>
  </div>
  <div class="bar-btns">
    <button class="btn" id="editModeBtn" onclick="toggleEditMode()" style="background:#7c3aed;color:white;">✏️ 直接編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn" onclick="sendSignRequest()" style="background:#b45309;color:white;">✉️ 署名依頼</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>登録支援機関</label><select id="filterOrg" onchange="filterCases()"></select>
    <label>所属機関</label><select id="filterCompany" onchange="filterCases()"></select>
    <label>検索</label><input id="filterText" oninput="filterCases()" placeholder="名前で絞り込み">
    <label>案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">基本情報</div>
      <div class="fg"><label>書類作成日（＝契約年月日）</label><input id="f_docDate" oninput="p()"></div>
      <div class="fg"><label>申請人氏名</label><input id="f_applicant" oninput="p()"></div>
      <div class="fg"><label>所属機関名</label><input id="f_company" oninput="p()"></div>
      <div class="fg"><label>作成責任者役職・氏名</label><input id="f_author" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">登録支援機関</div>
      <div class="fg"><label>登録支援機関名</label><input id="f_soName" oninput="p()"></div>
      <div class="fg"><label>登録番号</label><input id="f_soNo" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">雇用条件</div>
      <div class="fg"><label>契約終了日</label><input id="f_contractEnd" oninput="p()"></div>
      <div class="fg"><label>委託料（月額）</label><input id="f_supportFee" oninput="p()"></div>
    </div>
  </div>
</div>
<div class="pp">
  <div class="page-nav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">14pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776264504"></script>
<script>
function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea'); if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="text-align:left;font-size:7pt;margin-bottom:2mm;">参考様式第１－２５号</div>
<div style="font-weight:bold;text-align:center;margin:4mm 0;">登録支援機関との支援委託契約に関する説明書</div>
<div style="font-size:14pt;margin-bottom:24px;">　登録支援機関との１号特定技能外国人支援計画の全部の委託契約の概要は<br>下記のとおりです。</div>
<div style="margin-bottom:24px;">記</div>
<table style="width:100%;border-collapse:collapse;margin-bottom:24px;font-size:11pt;">
  <tr>
    <td style="border:1px solid #555;padding:3px 6px;width:5%;text-align:center;">１</td>
    <td style="border:1px solid #555;padding:3px 6px;width:30%;">申請人（支援対象者）</td>
    <td style="border:1px solid #555;padding:3px 6px;" colspan="2">${f('f_applicant')}</td>
  </tr>
  <tr>
    <td style="border:1px solid #555;padding:3px 6px;text-align:center;">２</td>
    <td style="border:1px solid #555;padding:3px 6px;">契約の相手方（登録支援機関）</td>
    <td style="border:1px solid #555;padding:3px 6px;">${f('f_soName')}</td>
    <td style="border:1px solid #555;padding:3px 6px;white-space:nowrap;">（${f('f_soNo')}）</td>
  </tr>
  <tr>
    <td style="border:1px solid #555;padding:3px 6px;text-align:center;">３</td>
    <td style="border:1px solid #555;padding:3px 6px;">契約年月日</td>
    <td style="border:1px solid #555;padding:3px 6px;" colspan="2">${f('f_docDate')}</td>
  </tr>
  <tr>
    <td style="border:1px solid #555;padding:3px 6px;text-align:center;">４</td>
    <td style="border:1px solid #555;padding:3px 6px;">委託する支援業務（１号特定技能外国人支援計画の全部であること）</td>
    <td style="border:1px solid #555;padding:3px 6px;" colspan="2">該当　・　非該当</td>
  </tr>
  <tr>
    <td style="border:1px solid #555;padding:3px 6px;text-align:center;">５</td>
    <td style="border:1px solid #555;padding:3px 6px;">委託料（１名当たりの月額）</td>
    <td style="border:1px solid #555;padding:3px 6px;" colspan="2">${f('f_supportFee')} 円</td>
  </tr>
  <tr>
    <td style="border:1px solid #555;padding:3px 6px;text-align:center;">６</td>
    <td style="border:1px solid #555;padding:3px 6px;">契約期間</td>
    <td style="border:1px solid #555;padding:3px 6px;" colspan="2">${f('f_docDate')}から${f('f_contractEnd')}まで</td>
  </tr>
</table>
<div style="font-size:10pt;margin-bottom:16px;">
（注意）<br>
１　項番１に関し、複数の申請人（同時申請に限る。）について、全ての項目の内容が同一の場合には「別紙のとおり」として別紙を添付して差し支えない。<br>
２　項番２に関し、登録支援機関登録簿に登録された氏名又は名称を記載すること。
</div>
<div style="font-size:10pt;text-align:right;margin-bottom:4px;">${f('f_docDate')}</div>
<div style="font-size:10pt;text-align:right;margin-bottom:2px;">特定技能所属機関の氏名又は名称　　${f('f_company')}</div>
<div style="font-size:10pt;text-align:right;">作成責任者　役職・氏名　　${f('f_author')}</div>
</div>`;
  _fontSize = (_fontSize === 8.5) ? 14 : _fontSize;
  _applyFontSize();
  const lbl=document.getElementById('fontSizeLabel');if(lbl)lbl.textContent=_fontSize+'pt';
  setupPageTracker();
  fitDocToPreview();
}
async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info; try{info=JSON.parse(sel.value);}catch(e){return;}
  const {caseId,companyId,companyName}=info;
  try{
    const [cases,cos]=await Promise.all([
      sb('cases?select=applicant,emp_set_idx&id=eq.'+caseId),
      companyId?sb(`companies?select=name,author_name,author_title,support_org_name,support_org_no,emp_sets&id=eq.${companyId}`)
        :companyName?sb(`companies?select=name,author_name,author_title,support_org_name,support_org_no,emp_sets&name=eq.${encodeURIComponent(companyName)}`):Promise.resolve([])
    ]);
    const cas=cases&&cases[0]; const co=cos&&cos[0];
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(cas) s('f_applicant',cas.applicant||'');
    if(co){
      s('f_company',co.name||'');
      s('f_author',[co.author_title,co.author_name].filter(Boolean).join('　'));
      s('f_soName',co.support_org_name||'');
      s('f_soNo',co.support_org_no||'');
      const idx=parseInt((cas&&cas.emp_set_idx)||0)||0;
      const es=(co.emp_sets||[])[idx]||{};
      if(es.supportFee) s('f_supportFee',es.supportFee);
    }
    const persons=await sb('persons?select=contract_end&case_id=eq.'+caseId);
    const pd=persons&&persons[0];
    if(pd?.contract_end){const m=String(pd.contract_end).match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);if(m)s('f_contractEnd',`${m[1]}年${parseInt(m[2])}月${parseInt(m[3])}日`);}
    if(!v('f_docDate')){const n=new Date();document.getElementById('f_docDate').value=`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`;}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);console.error(e);}
}
initCaseSelect(); p();

function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp = document.querySelector('.pp');
    const area = document.getElementById('pageArea');
    if(!pp || !area) return;
    const ppW = pp.clientWidth - 40;
    const docW = 794;
    if(ppW < docW){
      const scale = ppW / docW;
      area.querySelectorAll('.doc').forEach(d=>{
        d.style.zoom = scale;
      });
    } else {
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = 1; });
    }
  });
}
window.addEventListener('resize', fitDocToPreview);
</script>
</body>
</html>
