function _applyJuuyouViFontSize(){

  const s=_fontSize/10;
  st.textContent=[

    `.doc [style*="font-size:11pt"]{font-size:${(11*s).toFixed(2)}pt!important}`,

    `.ja{font-size:${(10.5*s).toFixed(2)}pt!important}`,
    `.vi{font-size:${(9.5*s).toFixed(2)}pt!important}`,
    `.sec-h{font-size:${(11*s).toFixed(2)}pt!important}`,

    `.tbl-amt{font-size:${(10*s).toFixed(2)}pt!important}`,
  ].join('');
}
async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info; try{info=JSON.parse(sel.value);}catch(e){return;}
  const {caseId,companyId,companyName}=info;
  try{
    const [cos]=await Promise.all([
      companyId?sb(`companies?select=name,full_address,author_name,author_title,tel&id=eq.${companyId}`)
        :companyName?sb(`companies?select=name,full_address,author_name,author_title,tel&name=eq.${encodeURIComponent(companyName)}`):Promise.resolve([])
    ]);
    const co=cos&&cos[0];
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(co){
      s('f_orgName',co.name||'');
      s('f_orgAddress',co.full_address||'');
      s('f_orgTel',co.tel||'');
      s('f_repTitle',co.author_title||'');
      s('f_repName',co.author_name||'');
    }
    if(!v('f_createY')){
      const n=new Date();
      document.getElementById('f_createY').value=String(n.getFullYear());
      document.getElementById('f_createM').value=String(n.getMonth()+1);
      document.getElementById('f_createD').value=String(n.getDate());
    }
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);console.error(e);}
}
initCaseSelect(); p();

function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp = document.querySelector('.pp');
    const area = document.getElementById('pageArea');
    if(!pp || !area) return;
    const ppW = pp.clientWidth - 40;
    const docW = 794;
    if(ppW < docW){
      const scale = ppW / docW;
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = scale; });
    } else {
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = 1; });
    }
  });
}
window.addEventListener('resize', fitDocToPreview);

window.addEventListener('message', function(e){
  if(!e.data||e.data.type!=='SELECT_CASE') return;
  const info=e.data.info;
  if(!info||!info.caseId) return;
  const sel=document.getElementById('caseSelect');
  if(sel){
    let found=false;
    for(let o of sel.options){
      try{
        const d=JSON.parse(o.value);
        if(d.caseId===info.caseId){sel.value=o.value;found=true;break;}
      }catch(e2){}
    }
    if(!found){
      const opt=document.createElement('option');
      opt.value=JSON.stringify(info);
      opt.textContent='（indexから選択）';
      sel.appendChild(opt);
      sel.value=opt.value;
    }
  }
  if(typeof loadFromDB==='function') loadFromDB();
});
