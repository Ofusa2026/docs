<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>申請内容変更申出書</title>
<style>.fp-case{display:none!important;}</style>
<link rel="stylesheet" href="ofusa_common.css?v=1776264504">
<style>
.doc{padding:12mm 17mm 5mm 15mm!important;line-height:1.6!important;min-height:auto!important}
@media print{
  .app-bar,.fp{display:none!important}
  .main{display:block!important}
  .doc{box-shadow:none!important;margin:0!important}
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 申請内容変更申出書</div>
    <div class="ver">ver.20260416.05</div>
  </div>
  <div class="bar-btns">
    <button class="btn" id="editModeBtn" onclick="toggleEditMode()" style="background:#7c3aed;color:white;">✏️ 直接編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>登録支援機関</label><select id="filterOrg" onchange="filterCases()"></select>
    <label>所属機関</label><select id="filterCompany" onchange="filterCases()"></select>
    <label>検索</label><input id="filterText" oninput="filterCases()" placeholder="名前で絞り込み">
    <label>案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">基本情報</div>
      <div class="fg"><label>管轄入管</label><input id="f_imm" oninput="p()"></div>
      <div class="fg"><label>申請日（年）</label><input id="f_year" oninput="p()"></div>
      <div class="fg"><label>申請日（月）</label><input id="f_month" oninput="p()"></div>
      <div class="fg"><label>申請日（日）</label><input id="f_day" oninput="p()"></div>
      <div class="fg"><label>申請番号</label><input id="f_appNo" oninput="p()"></div>
      <div class="fg"><label>申請種別</label>
        <select id="f_appType" onchange="p()">
          <option value="1">在留資格変更許可申請</option>
          <option value="2">在留期間更新許可申請</option>
        </select>
      </div>
      <div class="fg"><label>申出日（年月日）</label><input id="f_applyDate" oninput="p()"></div>
    </div>
  </div>
</div>
<div class="pp">
  <div class="page-nav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">9.5pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776264504"></script>
<script>
function getImm(appNo){
  const map = {
    '札':'札幌出入国在留管理局','仙':'仙台出入国在留管理局','東':'東京出入国在留管理局',
    '横':'横浜出入国在留管理局','名':'名古屋出入国在留管理局','大':'大阪出入国在留管理局',
    '広':'広島出入国在留管理局','高':'高松出入国在留管理局','福':'福岡出入国在留管理局',
    '那':'那覇出入国在留管理局','阪':'大阪出入国在留管理局','神':'神戸出入国在留管理局',
  };
  if(!appNo) return '';
  const ch = appNo.charAt(0);
  return map[ch] || '';
}
function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea'); if(!w) return;
  const appType = document.getElementById('f_appType')?.value||'1';
  const type1checked = appType==='1'?'■':'□';
  const type2checked = appType==='2'?'■':'□';
  const autoImm = getImm(v('f_appNo'));
  const immText = autoImm || f('f_imm');
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="font-size:6.5pt;margin-bottom:2mm;">別記第三十号の三様式（第二十一条の三，第二十条の四関係）</div>
<div style="text-align:right;font-size:9pt;margin-bottom:4mm;">日本国政府法務省</div>
<div style="font-size:13pt;font-weight:bold;text-align:center;letter-spacing:6px;margin-bottom:6mm;">申　請　内　容　変　更　申　出　書</div>
<div style="font-size:9pt;margin-bottom:1mm;">${immText}<span style="margin-left:2em;">出入国在留管理局長　　殿</span></div>
<div style="border-bottom:1px solid #333;margin-bottom:2mm;width:14em;"></div>
<div style="margin-bottom:2em;"></div>
<div style="font-size:9pt;margin-bottom:6mm;">　出入国管理及び難民認定法施行規則第21条の３又は第21条の４の規定に基づき，次のとおり申請内容の変更を申し出ます。</div>
<div style="font-size:9pt;white-space:nowrap;margin-bottom:2mm;">
  <span style="text-decoration:underline;">${f('f_year')}年</span>　　<span style="text-decoration:underline;">${f('f_month')}月</span>　　<span style="text-decoration:underline;">${f('f_day')}日</span>　に行った
</div>
<div style="font-size:9pt;margin-left:4em;margin-bottom:3mm;">1．在留資格変更許可申請</div>
<div style="font-size:9pt;margin-left:4em;margin-bottom:3mm;">2．在留期間更新許可申請</div>
<div style="font-size:9pt;margin-bottom:4mm;">（申請番号　　${f('f_appNo')}　　）</div>
<div style="font-size:9pt;margin-bottom:2mm;">については，申請の内容を</div>
<div style="border-bottom:1px solid #333;margin-bottom:2mm;min-height:16mm;"></div>
<div style="font-size:9pt;margin-bottom:6mm;">に変更したく，申し出ます。</div>
<div style="font-size:9pt;margin-bottom:3mm;">法定代理人（法定代理人による申出の場合に記入）</div>
<div style="font-size:9pt;margin-bottom:2mm;white-space:nowrap;">
  (1)氏　名　<span style="text-decoration:underline;">　　　　　　　　　　　　　　</span>　　(2)本人との関係　<span style="text-decoration:underline;">　　　　　　　　　</span>
</div>
<div style="font-size:9pt;margin-bottom:2mm;">
  (3)住　所　<span style="text-decoration:underline;">　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　</span>
</div>
<div style="font-size:9pt;margin-bottom:6mm;white-space:nowrap;">
  電話番号　<span style="text-decoration:underline;">　　　　　　　　　　　</span>　　携帯電話番号　<span style="text-decoration:underline;">　　　　　　　　　　　</span>
</div>
<div style="font-size:9pt;margin-bottom:1mm;">以上の記載内容は事実と相違ありません。</div>
<div style="font-size:9pt;margin-bottom:2mm;">申出人（法定代理人）の署名／申出書作成年月日</div>
<div style="font-size:9pt;text-align:right;margin-bottom:4mm;text-decoration:underline double;">年　　　　月　　　　日</div>
<div style="font-size:8.5pt;margin-bottom:3mm;">
  <span style="font-weight:bold;">注　意</span><br>
  申出書作成後申出までに記載内容に変更が生じた場合，申出人（法定代理人）が変更箇所を訂正し，署名すること。<br>
  申出書作成年月日は申出人（法定代理人）が自署すること。
</div>
<div style="border-top:1px solid #555;padding-top:3mm;font-size:9pt;">
  <div style="margin-bottom:2mm;">※　取次者</div>
  <div style="margin-bottom:2mm;white-space:nowrap;">
    (1)氏　名　<span style="text-decoration:underline;">　　　　　　　　　　　　　　　　　</span>　　(2)住　所　<span style="text-decoration:underline;">東京都大田区蒲田５丁目１１−１０　FUNDES蒲田8階　　　</span>
  </div>
  <div style="white-space:nowrap;">
    (3)所属機関等（親族等については，本人との関係）<span style="text-decoration:underline;">　大房行政書士法人　　　　　　　　　　</span>　電話番号<span style="text-decoration:underline;">　03－6424－8849　</span>
  </div>
</div>
</div>`;
  _fontSize = (_fontSize === 8.5) ? 9.5 : _fontSize;
  _applyFontSize();
  const lbl=document.getElementById('fontSizeLabel');if(lbl)lbl.textContent=_fontSize+'pt';
  setupPageTracker();
  fitDocToPreview();
}
function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp=document.querySelector('.pp');
    const area=document.getElementById('pageArea');
    if(!pp||!area) return;
    const ppW=pp.clientWidth-40;
    const docW=794;
    if(ppW<docW){const scale=ppW/docW;area.querySelectorAll('.doc').forEach(d=>{d.style.zoom=scale;});}
    else{area.querySelectorAll('.doc').forEach(d=>{d.style.zoom=1;});}
  });
}
window.addEventListener('resize', fitDocToPreview);

async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info; try{info=JSON.parse(sel.value);}catch(e){return;}
  const {caseId}=info;
  try{
    const cases=await sb('cases?select=reception_no,org&id=eq.'+caseId);
    const cas=cases&&cases[0];
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(cas) s('f_appNo',cas.reception_no||'');
    if(!v('f_applyDate')){const n=new Date();s('f_applyDate',`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`);}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);}
}
initCaseSelect(); p();

// index.htmlからの案件選択を受信
window.addEventListener('message', function(e){
  if(!e.data||e.data.type!=='SELECT_CASE') return;
  const info=e.data.info;
  if(!info||!info.caseId) return;
  // caseSelectに値をセットしてloadFromDB()を呼ぶ
  const sel=document.getElementById('caseSelect');
  if(sel){
    // 既存のoptionを探すかなければ追加
    let found=false;
    for(let o of sel.options){
      try{
        const d=JSON.parse(o.value);
        if(d.caseId===info.caseId){sel.value=o.value;found=true;break;}
      }catch(e2){}
    }
    if(!found){
      const opt=document.createElement('option');
      opt.value=JSON.stringify(info);
      opt.textContent='（indexから選択）';
      sel.appendChild(opt);
      sel.value=opt.value;
    }
  }
  if(typeof loadFromDB==='function') loadFromDB();
});
</script>
</body>
</html>
