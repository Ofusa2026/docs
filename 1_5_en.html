<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>参考様式第１－５号 特定技能雇用契約書（英語）</title>
<link rel="stylesheet" href="ofusa_common.css?v=1776381161">
<style>
.doc{
  background:white;
  width:794px;
  min-height:1123px;
  flex-shrink:0;
  margin:0 0 24px 0;
  padding:15mm 14mm;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  font-family:'MS Mincho','Yu Mincho','Hiragino Mincho ProN',serif;
  font-size:8.5pt;line-height:1.9;color:#000;
  position:relative;
  box-sizing:border-box;
  overflow:hidden;
}
.page-num-label{
  position:absolute;top:5px;right:8px;
  font-size:8px;color:#bbb;font-family:sans-serif;
  background:white;padding:0 2px;
}
.id{color:#000;}
.f{color:#1a56db;font-weight:bold;}
.sign-box{
  border:1px solid #555;
  padding:6px 10px;
  margin-top:4px;
  min-height:48px;
  display:flex;
  align-items:center;
}
.sign-row{
  display:flex;
  gap:8px;
  align-items:flex-start;
  margin-top:8px;
}
.sign-label{
  white-space:nowrap;
  font-size:8pt;
  min-width:2em;
}
.sign-content{
  flex:1;
  border-bottom:1px solid #aaa;
  min-height:40px;
  font-size:8pt;
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title" id="docTitle">📄 参考様式第１－５号　特定技能雇用契約書（英語版）</div>
    <div class="ver">ver.20260417.136</div>
  </div>
  <div class="bar-btns">
    <button class="btn btn-save" onclick="saveForm()">💾 DB保存</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn" onclick="sendSignRequest()" style="background:#b45309;color:white;">✉️ 署名依頼</button>
    <button class="btn" id="styleModeBtn" onclick="toggleStyleMode()">🎨 スタイル編集</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>🔍 登録支援機関</label>
    <select id="filterOrg" onchange="filterCases()" style="width:100%;padding:4px;border:1px solid #bbb;border-radius:3px;font-size:11px;margin-bottom:5px;"></select>
    <label>🏢 所属機関</label>
    <select id="filterCompany" onchange="filterCases()" style="width:100%;padding:4px;border:1px solid #bbb;border-radius:3px;font-size:11px;margin-bottom:5px;"></select>
    <label>🔤 検索（案件名・人材名）</label>
    <input id="filterKeyword" oninput="filterCases()" placeholder="名前・案件名で絞り込み" style="width:100%;padding:4px;border:1px solid #bbb;border-radius:3px;font-size:11px;margin-bottom:5px;">
    <label>👤 案件選択 <span id="caseCount" style="font-size:9px;color:#888;"></span></label>
    <select id="caseSelect" size="6" style="width:100%;padding:2px;border:1px solid #bbb;border-radius:3px;font-size:11px;" onchange="selectCase()"></select>
  </div>
  <div class="fp-inner" id="formArea">
    <div class="fs"><div class="fs-title">所属機関</div>
      <div class="fg"><label>機関名（日）<span class="fid">es.orgName</span></label><input id="es_orgName" oninput="p()"></div>
      <div class="fg"><label>機関名（EN）<span class="fid">es.orgNameEn</span></label><input id="es_orgNameEn" oninput="p()"></div>
      <div class="fg"><label>代表者役職（日）<span class="fid">es.repTitle</span></label><input id="es_repTitle" oninput="p()"></div>
      <div class="fg"><label>代表者氏名（日）<span class="fid">es.repName</span></label><input id="es_repName" oninput="p()"></div>
      <div class="fg"><label>代表者役職（EN）<span class="fid">es.repTitleEn</span></label><input id="es_repTitleEn" oninput="p()"></div>
      <div class="fg"><label>代表者氏名（EN）<span class="fid">es.repNameEn</span></label><input id="es_repNameEn" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">作成日</div>
      <div class="fg"><label>作成年<span class="fid">es.createY</span></label><input id="es_createY" oninput="p()"></div>
      <div class="fg"><label>作成月<span class="fid">es.createM</span></label><input id="es_createM" oninput="p()"></div>
      <div class="fg"><label>作成日<span class="fid">es.createD</span></label><input id="es_createD" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">特定技能外国人</div>
      <div class="fg"><label>氏名（日）<span class="fid">es.applicantName</span></label><input id="es_applicantName" oninput="p()"></div>
      <div class="fg"><label>氏名（EN）<span class="fid">es.applicantNameEn</span></label><input id="es_applicantNameEn" oninput="p()"></div>
    </div>
  </div>
</div>
<div class="pp">
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776381161"></script>
<script>
docId='1_5_en';
const _title='📄 参考様式第１－５号　特定技能雇用契約書（英語版）';
// f, v, esc, _fontSize, _editMode は ofusa_common.js で宣言済み

function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea');
  if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="font-size:8pt;margin-bottom:2px;">参考様式第１－５号<br><span class="id">Reference Form 1-5</span></div>

<div style="text-align:center;font-size:13pt;font-weight:bold;letter-spacing:0.15em;margin:6px 0 2px;">特　定　技　能　雇　用　契　約　書</div>
<div style="text-align:center;font-size:9pt;font-weight:bold;margin-bottom:8px;" class="id">EMPLOYMENT CONTRACT FOR SPECIFIED SKILLED WORKERS</div>

<div style="font-size:8.5pt;line-height:1.8;margin-bottom:8px;">
  特定技能所属機関　${f('es_orgName')}　（以下「甲」という。）と<br>
  <span class="id" style="font-size:7.5pt;">Organization of affiliation of the specified skilled worker　${f('es_orgNameEn')}</span><br>
  <span class="id" style="font-size:7.5pt;">(hereinafter referred to as "organization") and</span><br>
  特定技能外国人（候補者を含む。）　${f('es_applicantName')}　（以下「乙」という。）は、<br>
  <span class="id" style="font-size:7.5pt;">Specified skilled worker (including specified skilled worker candidates)　${f('es_applicantNameEn')}</span><br>
  <span class="id" style="font-size:7.5pt;">(hereinafter referred to as "specified skilled worker")</span>
</div>

<div style="font-size:8.5pt;margin-bottom:4px;">
  別添の雇用条件書に記載された内容に従い，特定技能雇用契約を締結する。<br>
  <span class="id" style="font-size:7.5pt;">This Employment Contract is hereby entered into in accordance with the contents described in the attached Written Employment Conditions.</span>
</div>



<div style="font-size:8.5pt;margin-bottom:6px;">
  本雇用契約は、乙が、在留資格「特定技能１号」若しくは「特定技能２号」の上陸許可又は在留資格変更許可等を受けた日から、甲乙双方が速やかに調整を行い、同日から１か月以内の甲乙双方の合意により定めた日から雇用を開始するものとする。<br>
  <span class="id" style="font-size:7pt;">This employment contract will commence on a date to be determined by mutual agreement between the organization and the specified skilled worker within one month from the date the specified skilled worker receives landing permission for the status of residence "Specified Skilled Worker No. 1" or "Specified Skilled Worker No. 2", or permission for change of status of residence, etc.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  雇用条件書に記載の雇用契約期間（雇用契約の始期と終期）は、甲乙双方の調整により定めた雇用を開始する日に伴って変更されるものとする。<br>
  <span class="id" style="font-size:7pt;">The period of the Employment Contract (beginning and end of the Employment Contract) stated in the Written Employment Conditions shall be changed in accordance with the start date of employment specified with the adjustment made between the organization and the specified skilled worker.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  甲乙双方は、乙の在留資格に係る審査結果を互いに情報共有することとする。<br>
  <span class="id" style="font-size:7pt;">The organization and the specified skilled worker shall share with each other the results of the assessment of the specified skilled worker's status of residence.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:6px;">
  なお，雇用契約を更新することなく雇用契約期間を満了した場合，及び乙が何らかの事由で在留資格を喪失した時点で雇用契約は終了するものとする。<br>
  <span class="id" style="font-size:7pt;">The Employment Contract shall be terminated at the time of the period of the Employment Contract expiring without being renewed, or if the specified skilled worker has forfeited the status of residence for any reason.</span>
</div>

<div style="font-size:8.5pt;margin-bottom:12px;">
  本雇用契約書及び雇用条件書は２部作成し，甲乙それぞれが保有するものとする。<br>
  <span class="id" style="font-size:7pt;">The Employment Contract and Written Employment Conditions shall be prepared in duplicate, and one copy shall be retained by each party.</span>
</div>



<!-- 締結日 -->
<div style="text-align:right;font-size:8pt;margin-bottom:10px;line-height:1.8;">
  ${f('es_createY')}　年　${f('es_createM')}　月　${f('es_createD')}　日　締結<br>
  <span class="id" style="font-size:7.5pt;">Entered into on ${f('es_createD')} / ${f('es_createM')} / ${f('es_createY')}</span>
</div>

<!-- 署名欄 -->
<div style="display:flex;font-size:8pt;margin-top:8px;line-height:1.9;">
  <!-- 甲（左カラム）-->
  <div style="flex:1;">
    <div style="margin-left:10em;">${f('es_orgName')}</div>
    <div>甲<span style="margin-left:5em;">${f('es_repTitle')}　${f('es_repName')}<span style="margin-left:5em;">印</span></span></div>
    <div style="height:0.8em;"></div>
    <div style="font-size:7.5pt;">（特定技能所属機関名・代表者役職名・氏名・捺印）</div>
    <div style="height:0.8em;"></div>
    <div style="margin-left:10em;">${f('es_orgNameEn')}</div>
    <div>Organization&emsp;${f('es_repTitleEn')}　${f('es_repNameEn')}　Seal</div>
    <div style="font-size:7pt;">(Name of the organization of affiliation of the<br>specified skilled worker, and name, title and seal<br>of its representative)</div>
  </div>
  <!-- 乙（右カラム）-->
  <div style="flex:1;" class="sign-field" data-signer="applicant" data-label="乙署名">
    <div style="line-height:1.9;">&nbsp;</div><!-- orgName行と高さ合わせ -->
    <div>乙
      <div class="sign-field-area" style="height:22px;display:inline-block;min-width:10em;vertical-align:middle;position:relative;border-top:none;margin-top:0;">
        <span class="sign-field-placeholder" style="color:#bbb;font-size:9px;">← 署名</span>
        <img class="sign-field-img" style="display:none;max-height:20px;">
      </div>
    </div>
    <div style="height:0.8em;"></div>
    <div style="font-size:7.5pt;">（特定技能外国人の署名）</div>
    <div style="height:0.8em;"></div>
    <div>&nbsp;</div>
    <div>Specified skilled worker</div>
    <div style="font-size:7pt;">(Signature of the specified skilled worker)</div>
  </div>
</div>

</div><!-- /doc -->
`;
  _fontSize=(_fontSize===8.5)?8.5:_fontSize;
  _applyFontSize();
  _apply15_enFontSize();
  setupPageTracker();
}

function _apply15_enFontSize(){
  const st=document.getElementById('_15_enFontStyle')||document.createElement('style');
  st.id='_15_enFontStyle';
  document.head.appendChild(st);
  const s=_fontSize/8.5;
  st.textContent=[
    `.doc [style*="font-size:13pt"]{font-size:${(13*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
  ].join('');
}

p();
</script>
</body>
</html>
