  <div class="sec-h-vi">နည်းပညာများအားကျွမ်းကျင်မှုစသည်အပေါ်လိုက်၍ လစာတိုးမြှင့်ခြင်းအကြောင်း<br>(လစာတိုးမည့်ပမာဏ၊ လစာတိုးမြှင့်ခြင်းသတ်မှတ်ချက်များနှင့်၊ လစာတိုးမြှင့်ကာလများနှင့်ပတ်သက်၍ရှင်းပြရန်။ လုပ်ဆောင်ရမည့် တိကျသောလုပ်ငန်းအမျိုးအစားနှင့် လုပ်ငန်းအကြောင်းအရာကိုလိုက်၍ ၎င်းနှင့်ညီမျှသော နည်းပညာကို တတ်မြောက်ထားသည့် ဂျပန်လူမျိုးမှ လုပ်ဆောင်သည့်အခြေအနေရှိ ခံစားခွင့်ဘောနပ်စ်နှင့် တန်းတူသို့မဟုတ် ထို့ထက်ပိုမည်ဖြစ်ကြောင်းကို သိထားရန်။)</div>

<div class="sec">
  <div class="sec-h">９．従事させる業務区分、工事業等に応じた安全衛生教育及び技能の習得について</div>
  <div class="row ja" style="font-size:9.5pt;">（安全衛生教育の実施内容や、技能検定の受験時期や合格後の支給手当、昇給への反映等について説明すること）</div>
  <div class="sec-h-vi">လုပ်ဆောင်ရမည့်လုပ်ငန်း အပိုင်းအခြား၊ ဆောက်လုပ်ရေးလုပ်ငန်းတို့အလိုက် ကျန်းမာရေးနှင့် ဘေးကင်းလုံခြုံမှုပညာပေးခြင်းနှင့် ကျွမ်းကျင်တတ်မြောက်မှုများအကြောင်း<br>(ကျန်းမာရေးနှင့်ဘေးကင်းလုံခြုံမှုပညာပေးခြင်းလက်တွေ့အကောင်အထည်ဖော်မှုအကြောင်းအရာများ၊ ကျွမ်းကျင်မှု စာမေးပွဲဖြေဆိုရမည့်ကာလ၊ စာမေးပွဲအောင်မြင်ပြီးနောက်၏ လစာခံစားခွင့်၊ လစာတိုးမြှင့်မှုအပေါ်သုံးသပ်မှု စသည်တို့နှင့် ပတ်သက်၍ရှင်းလင်းပြရန်)</div>
  <div style="padding:1mm 0;">
    <div class="row ja">採用時、作業内容の変更、労働安全衛生法上に定める危険又は有害な業務、職長等の職務に従事することとなったとき、法令に安全衛生教育の実施が必要とされるときは安全衛生教育を実施する。受入れ後1年以内に建設キャリアアップシステムのレベル２に相当する技能教育を施す。また、受入れ後3年以内に技能検定1級、取得を目標とするため、社内勉強会の開催等を行う。</div>
    <div class="row vi">အလုပ်ခန့်ထားစဉ်၊ အလုပ်အကြောင်းအရာပြောင်းလဲသည့်အခါ၊ စက်မှုဘေးကင်းရေးနှင့် ကျန်းမာရေးအက်ဥပဒေက သတ်မှတ်ထားသည့် အန္တရာယ်ရှိသော သို့မဟုတ် အန္တရာယ်ရှိသောအလုပ်တွင် ခန့်အပ်ခံရသည့်အခါ၊ ဖိုမင်ရာထူးကို တာဝန်ပေးအပ်သည့်အခါ၊ စသည်တို့ကို အလုပ်ခန့်ထားသည့်အခါ၊ ဥပဒေအရ လိုအပ်သည့်အချိန်တွင် ကျွန်ုပ်တို့သည် လုံခြုံမှုနှင့် ကျန်းမာရေးပညာပေးမှုကို ပေးပါသည်။ လက်ခံပြီး တစ်နှစ်အတွင်း ဆောက်လုပ်ရေးအသက်မွေးဝမ်းကျောင်းတိုးမြှင့်မှုစနစ်၏ အဆင့် ၂ နှင့်ညီမျှသော ကျွမ်းကျင်မှုပညာပေးခြင်းကို ပြုလုပ်ပေးပါသည်။ လက်ခံပြီး သုံးနှစ်အတွင်း ဝန်ထမ်းအသစ်များ Grade 1 Skills Certification ကို လက်ခံရရှိရန် ရည်ရွယ်ချက်ဖြင့် ကုမ္ပဏီတွင်း လေ့လာမှု ဆွေးနွေးပွဲများကို ကျင်းပပါသည်။</div>

async function loadFromDB(passedInfo){
  let info = passedInfo;
  if(!info){
    const sel=document.getElementById('caseSelect');
    if(!sel||!sel.value) return;
    try{ info=JSON.parse(sel.value); }catch(e){ return; }
  }
  if(!info||!info.caseId){ console.warn('[doc] no caseId'); return; }
  console.log('[doc] loadFromDB caseId='+info.caseId+' companyId='+info.companyId+' companyName='+info.companyName);
  const {caseId,companyId,companyName}=info;
  try{
    const [cos]=await Promise.all([
      companyId?sb(`companies?select=name,full_address,author_name,author_title,tel&id=eq.${companyId}`)
        :companyName?sb(`companies?select=name,full_address,author_name,author_title,tel&name=eq.${encodeURIComponent(companyName)}`):Promise.resolve([])
    ]);
    const co=cos&&cos[0];
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(co){
      s('f_orgName',co.name||'');
      s('f_orgAddress',co.full_address||'');
      s('f_orgTel',co.tel||'');
      s('f_repTitle',co.author_title||'');
      s('f_repName',co.author_name||'');
    }
    if(!v('f_createY')){
      const n=new Date();
      document.getElementById('f_createY').value=String(n.getFullYear());
      document.getElementById('f_createM').value=String(n.getMonth()+1);
      document.getElementById('f_createD').value=String(n.getDate());
    }
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);console.error(e);}
}

function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp = document.querySelector('.pp');
    const area = document.getElementById('pageArea');
    if(!pp || !area) return;
    const ppW = pp.clientWidth - 40;
    const docW = 794;
    if(ppW < docW){
      const scale = ppW / docW;
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = scale; });
    } else {
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = 1; });
    }
  });
}
window.addEventListener('resize', fitDocToPreview);

window.addEventListener('message', async function(e){
  if(!e.data||e.data.type!=='SELECT_CASE') return;
  const info=e.data.info;
  if(!info||!info.caseId) return;
  const sel=document.getElementById('caseSelect');
  if(sel){
    let found=false;
    for(let o of sel.options){
      try{
        const d=JSON.parse(o.value);
        if(d.caseId===info.caseId){sel.value=o.value;found=true;break;}
      }catch(e2){}
    }
    if(!found){
      const opt=document.createElement('option');
      opt.value=JSON.stringify(info);
      opt.textContent='（indexから選択）';
      sel.appendChild(opt);
      sel.value=opt.value;
    }
  }
  // まず共通関数で全入力欄を埋める
  if(typeof loadCaseToForm==='function'){ await loadCaseToForm(info); }
  // 書類固有の追加処理があれば loadFromDB で補完
  if(typeof loadFromDB==='function') loadFromDB(info);
});
