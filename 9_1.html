<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>分野参考様式第９－１号（特定技能所属機関）</title>
<style>.fp-case{display:none!important;}</style>
<link rel="stylesheet" href="ofusa_common.css?v=1776949489">
<style>
.doc{padding:15mm!important;line-height:1.35!important;min-height:auto!important}
@media print{
  .app-bar,.fp{display:none!important}
  .main{display:block!important}
  .doc{box-shadow:none!important;margin:0!important;padding:15mm!important}
  .f[style*="color:#aaa"]{visibility:hidden}
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 分野参考様式第９－１号（航空）　受入れに関する誓約書</div>
    <div class="ver">ver.20260417.93</div>
  </div>
  <div class="bar-btns">
    <button class="btn" id="editModeBtn" onclick="toggleEditMode()" style="background:#7c3aed;color:white;">✏️ 直接編集</button>
    <button class="btn" id="styleModeBtn" onclick="toggleStyleMode()" style="background:#0f766e;color:white;">🎨 スタイル編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn" onclick="sendSignRequest()" style="background:#b45309;color:white;">✉️ 署名依頼</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>登録支援機関</label><select id="filterOrg" onchange="filterCases()"></select>
    <label>所属機関</label><select id="filterCompany" onchange="filterCases()"></select>
    <label>検索</label><input id="filterText" oninput="filterCases()" placeholder="名前で絞り込み">
    <label>案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">基本情報</div>
      <div class="fg"><label>書類作成日</label><input id="f_docDate" oninput="p()"></div>
      <div class="fg"><label>作成責任者</label><input id="f_author" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">特定技能所属機関</div>
      <div class="fg"><label>氏名又は名称</label><input id="f_coName" oninput="p()"></div>
      <div class="fg"><label>住所</label><textarea id="f_coAddr" oninput="p()" rows="2"></textarea></div>
    </div>
    <div class="fs"><div class="fs-title">特定技能外国人</div>
      <div class="fg"><label>氏名（ローマ字）</label><input id="f_applicant" oninput="p()"></div>
      <div class="fg"><label>性別</label><input id="f_gender" oninput="p()"></div>
      <div class="fg"><label>国籍・地域</label><input id="f_nationality" oninput="p()"></div>
      <div class="fg"><label>生年月日</label><input id="f_birthdate" oninput="p()"></div>
    </div>
  </div>
</div>
<div class="pp">
  <div class="page-nav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">10.5pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1777007024"></script>
<script>
function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea'); if(!w) return;
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="text-align:left;font-size:10.5pt;margin-bottom:4px;">分野参考様式第９－１号（特定技能所属機関）</div>
<div style="font-size:14pt;font-weight:bold;text-align:center;margin:4mm 0;">航空分野における特定技能外国人の受入れに関する誓約書</div>
<div style="font-size:10.5pt;margin-bottom:2mm;">出入国在留管理庁長官　殿</div>
<table style="width:100%;border-collapse:collapse;font-size:10.5pt;margin-bottom:3mm;">
  <tr>
    <td style="width:40%;"></td>
    <td colspan="2">特定技能所属機関</td>
  </tr>
  <tr>
    <td></td>
    <td style="width:24%;padding-left:2em;">氏名又は名称</td>
    <td>${f('f_coName')}</td>
  </tr>
  <tr>
    <td></td>
    <td style="padding-top:2mm;padding-left:2em;">住　　　　所</td>
    <td style="padding-top:2mm;">${f('f_coAddr')}</td>
  </tr>
</table>
<table style="width:100%;border-collapse:collapse;font-size:10.5pt;margin-bottom:3mm;">
  <tr>
    <td style="width:40%;"></td>
    <td colspan="2">特定技能外国人</td>
  </tr>
  <tr>
    <td></td>
    <td style="width:24%;padding-left:2em;">氏　　　　名</td>
    <td>${f('f_applicant')}</td>
  </tr>
  <tr>
    <td></td>
    <td style="padding-top:1.5mm;padding-left:2em;">性　　　　別</td>
    <td style="padding-top:1.5mm;">${f('f_gender')}</td>
  </tr>
  <tr>
    <td></td>
    <td style="padding-top:1.5mm;padding-left:2em;">国籍・地域</td>
    <td style="padding-top:1.5mm;">${f('f_nationality')}</td>
  </tr>
  <tr>
    <td></td>
    <td style="padding-top:1.5mm;padding-left:2em;">生 年 月 日</td>
    <td style="padding-top:1.5mm;">${f('f_birthdate')}</td>
  </tr>
</table>
<div style="text-align:center;font-size:12pt;margin:2mm 0;">記</div>
<div style="font-size:10.5pt;margin-bottom:2mm;">　航空分野における上記の特定技能外国人を受け入れるに当たり、以下の事項について誓約します。</div>
<div style="border:1px solid #000;padding:3mm 5mm;font-size:10.5pt;">
  <div style="margin-bottom:1.5mm;">【誓約事項】</div>
  <div style="margin-bottom:2mm;text-indent:-1.5em;padding-left:1.5em;">１．特定技能外国人（出入国管理及び難民認定法（昭和２６年政令第３１９号）別表第１の２の表の特定技能の在留資格をもって在留する外国人をいう。以下同じ。）に従事させる業務が、空港グランドハンドリング（地上走行支援業務、手荷物・貨物取扱業務等）又は航空機整備（機体、装備品等の整備業務等）であること。</div>
  <div style="margin-bottom:2mm;text-indent:-1.5em;padding-left:1.5em;">２．特定技能雇用契約において特定技能外国人を労働者派遣事業の適正な運営の確保及び派遣労働者の保護等に関する法律（昭和６０年法律第８８号）第２条第１号に規定する労働者派遣の対象とするものではないことを定めること。</div>
  <div style="margin-bottom:2mm;text-indent:-1.5em;padding-left:1.5em;">３．空港管理規則（昭和２７年運輸省令第４４号）第１２条第１項若しくは第１２条の２第１項の承認を受けた者（航空法（昭和２７年法律第２３１号）第１００条第１項の許可を受けた者を含む。）若しくは同規則第１３条第１項の承認を受けた者若しくは同規則第１２条第１項、第１２条の２第１項若しくは第１３条第１項の規定に準じて定められた条例、規則その他の規程の規定に相当するものに基づき空港管理者により営業を行うことを認められた者であって、空港グランドハンドリングを営む者であること、又は同法第２０条第１項第３号、第４号若しくは第７号の能力について同項の認定を受けた者若しくは当該者から業務の委託を受けた者であること。</div>
  <div style="margin-bottom:2mm;text-indent:-1.5em;padding-left:1.5em;">４．国土交通省が設置する航空分野に係る特定技能外国人の受入れに関する協議会（以下「協議会」とする。）の構成員であること。</div>
  <div style="margin-bottom:2mm;text-indent:-1.5em;padding-left:1.5em;">５．協議会に対し、必要な協力を行うこと。</div>
  <div style="margin-bottom:2mm;text-indent:-1.5em;padding-left:1.5em;">６．国土交通省が行う調査又は指導に対し、必要な協力を行うこと。</div>
  <div style="margin-bottom:2mm;text-indent:-1.5em;padding-left:1.5em;">７．登録支援機関に適合１号特定技能外国人支援計画の全部の実施を委託する場合にあっては、下記(1)から(3)までのいずれにも該当する登録支援機関に委託すること。<br>(1) 協議会の構成員であること。<br>(2) 協議会に対し、必要な協力を行うこと。<br>(3) 国土交通省が行う調査又は指導に対し、必要な協力を行うこと。</div>
  <div style="text-indent:-1.5em;padding-left:1.5em;">８．特定技能外国人からの求めに応じ、実務経験を証明する書面を交付すること。</div>
</div>
<div style="font-size:10.5pt;margin-top:3mm;margin-bottom:4mm;text-indent:-2.2em;padding-left:2.2em;">（注）誓約事項を遵守することができなくなった場合は、その旨出入国在留管理庁長官及び当該分野を所管する関係行政機関の長に対し、報告を行うこと。</div>
<div style="font-size:10.5pt;margin-bottom:2mm;text-align:right;">作成年月日　${f('f_docDate')}</div>
<div style="font-size:10.5pt;text-align:right;">作成責任者　${f('f_author')}</div>
</div>`;
  _fontSize = (_fontSize === 8.5) ? 10.5 : _fontSize;
  _applyFontSize();
  _apply9_1FontSize();
  const lbl=document.getElementById('fontSizeLabel');if(lbl)lbl.textContent=_fontSize+'pt';
  setupPageTracker();
  fitDocToPreview();
}
function _apply9_1FontSize(){
  const st=document.getElementById('_9_1FontStyle')||document.createElement('style');
  st.id='_9_1FontStyle'; document.head.appendChild(st);
  const s=_fontSize/10.5;
  st.textContent=[
    `.doc [style*="font-size:14pt"]{font-size:${(14*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:12pt"]{font-size:${(12*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:10.5pt"]{font-size:${(10.5*s).toFixed(2)}pt!important}`,
  ].join('');
}
async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info; try{info=JSON.parse(sel.value);}catch(e){return;}
  const {caseId,companyId,companyName}=info;
  try{
    const [cases,cos]=await Promise.all([
      caseId?sb('cases?select=applicant,applicant_en&id=eq.'+caseId):Promise.resolve([]),
      companyId?sb(`companies?select=name,full_address,author_name,author_title&id=eq.${companyId}`)
        :companyName?sb(`companies?select=name,full_address,author_name,author_title&name=eq.${encodeURIComponent(companyName)}`):Promise.resolve([])
    ]);
    const cas=cases&&cases[0]; const co=cos&&cos[0];
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(co){
      s('f_coName',co.name||'');
      s('f_coAddr',co.full_address||'');
      s('f_author',[co.author_title,co.author_name].filter(Boolean).join('　'));
    }
    if(cas){
      s('f_applicant',cas.applicant_en||cas.applicant||'');
    }
    if(caseId){
      const persons=await sb('persons?select=gender,nationality,birthdate&case_id=eq.'+caseId);
      const pd=persons&&persons[0];
      if(pd){
        s('f_gender',pd.gender||'');
        s('f_nationality',pd.nationality||'');
        s('f_birthdate',pd.birthdate||'');
      }
    }
    if(!v('f_docDate')){const n=new Date();document.getElementById('f_docDate').value=`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`;}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);console.error(e);}
}
initCaseSelect(); p();

function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp = document.querySelector('.pp');
    const area = document.getElementById('pageArea');
    if(!pp || !area) return;
    const ppW = pp.clientWidth - 40;
    const docW = 794;
    if(ppW < docW){
      const scale = ppW / docW;
      area.querySelectorAll('.doc').forEach(d=>{
        d.style.zoom = scale;
      });
    } else {
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = 1; });
    }
  });
}
window.addEventListener('resize', fitDocToPreview);

// index.htmlからの案件選択を受信
window.addEventListener('message', async function(e){
  if(!e.data||e.data.type!=='SELECT_CASE') return;
  const info=e.data.info;
  if(!info||!info.caseId) return;
  const sel=document.getElementById('caseSelect');
  if(sel){
    let found=false;
    for(let o of sel.options){
      try{
        const d=JSON.parse(o.value);
        if(d.caseId===info.caseId){sel.value=o.value;found=true;break;}
      }catch(e2){}
    }
    if(!found){
      const opt=document.createElement('option');
      opt.value=JSON.stringify(info);
      opt.textContent='（indexから選択）';
      sel.appendChild(opt);
      sel.value=opt.value;
    }
  }
  // まず共通関数で全入力欄を埋める
  if(typeof loadCaseToForm==='function'){ await loadCaseToForm(info); }
  // 書類固有の追加処理があれば loadFromDB で補完
  if(typeof loadFromDB==='function') loadFromDB(info);
});
</script>
</body>
</html>
