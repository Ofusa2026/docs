<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>移行準備説明書</title>
<link rel="stylesheet" href="ofusa_common.css?v=1776264504">
<style>
/* 書類固有スタイル */
.underline{text-decoration:underline;}
.indent1{padding-left:2em;}
.indent2{padding-left:4em;}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 移行準備説明書（特定活動→特定技能１号）</div>
    <div class="ver">ver.20260415.07</div>
  </div>
  <div class="bar-btns">
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">

<!-- 左パネル -->
<div class="fp">
  <div class="fp-case">
    <label>🔍 登録支援機関</label>
    <select id="filterOrg" onchange="filterCases()" style="margin-bottom:5px;"></select>
    <label>🏢 所属機関</label>
    <select id="filterCompany" onchange="filterCases()" style="margin-bottom:5px;"></select>
    <label>🔤 検索（名前）</label>
    <input id="filterText" placeholder="名前で絞り込み" oninput="filterCases()" style="margin-bottom:5px;">
    <label>👤 案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">基本情報</div>
      <div class="fg"><label>申請人国籍<span class="fid">{{申請人国籍}}</span></label><input id="f_nationality" oninput="p()"></div>
      <div class="fg"><label>申請人氏名<span class="fid">{{申請人氏名}}</span></label><input id="f_name" oninput="p()"></div>
      <div class="fg"><label>分野<span class="fid">{{分野}}</span></label><input id="f_field" oninput="p()"></div>
      <div class="fg"><label>業務区分<span class="fid">{{業務区分}}</span></label><input id="f_category" oninput="p()"></div>
      <div class="fg"><label>技能区分<span class="fid">{{技能区分}}</span></label>
        <select id="f_skill" onchange="p()">
          <option value="">選択</option>
          <option value="１">①試験合格者</option>
          <option value="２">②技能実習２号良好修了者</option>
          <option value="３">③介護福祉士養成施設卒業者</option>
          <option value="４">④EPA介護福祉士候補者</option>
        </select>
      </div>
    </div>
    <div class="fs"><div class="fs-title">登録支援機関</div>
      <div class="fg"><label>機関名<span class="fid">{{登録支援機関名}}</span></label><input id="f_soName" oninput="p()"></div>
      <div class="fg"><label>登録番号<span class="fid">{{登録支援機関番号}}</span></label><input id="f_soNo" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">受入れ機関</div>
      <div class="fg"><label>機関名<span class="fid">{{所属機関名}}</span></label><input id="f_orgName" oninput="p()"></div>
      <div class="fg"><label>書類作成日<span class="fid">{{書類作成日}}</span></label><input id="f_date" oninput="p()" placeholder="令和〇年〇月〇日"></div>
    </div>
  </div>
</div>

<!-- プレビューエリア -->
<div class="pp" id="ppOuter">
  <div class="page-nav" id="pageNav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <button class="pn-btn" id="editModeBtn" onclick="toggleEditMode()" style="margin-left:8px;background:#7c3aed;color:white;border-color:#7c3aed;">✏️ 直接編集</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">8.5pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>

<script src="ofusa_common.js?v=1776264504"></script>
<script>
// ===== 移行準備説明書 固有処理 =====

function p(){
  if(_editMode) return; // 直接編集中はブロック
  const w=document.getElementById('pageArea');
  if(!w) return;
  const skillVal=v('f_skill');
  const ul=s=>`<span class="underline">${s}</span>`;

  w.innerHTML=`
<div class="doc">
<div style="text-align:center;font-size:9pt;margin-bottom:4px;">＜特定技能１号への申請予定者のための「特定活動」用＞</div>
<div style="text-align:center;font-size:14pt;font-weight:bold;letter-spacing:8px;margin:8px 0 16px;">説　　明　　書</div>
<div style="padding-left:2em;margin-bottom:12px;">
  <div>国籍・地域　　　${f('f_nationality')}</div>
  <div>氏　　　名　　　${f('f_name')}</div>
  <div style="margin-top:8px;">上記の者を受け入れるに当たって，下記のとおりの事実に相違ありません。</div>
  <div style="text-align:center;margin:4px 0;">記</div>
</div>
<div style="margin-bottom:10px;">
  <div style="font-weight:bold;">１　在留期間の満了日までに「特定技能１号」への在留資格変更許可申請をすることができない事情</div>
  <div style="border:1px solid #555;padding:8px 12px;margin-top:6px;font-size:10pt;line-height:1.9;">
    この度弊社で特定技能１号として雇用契約を締結することに決定したが、弊社側の特定技能１号申請への準備（書類準備等）が整っておらず、許可が出るまで、２ヶ月以上の時間がかかることが見込まれるため、特定技能での在留資格が取得できるまでの間、申請人の生活確保のためにも、特定活動で就労を可能にしたいと考えております。<br>
    また、弊社で${f('f_field')}に必要な指導、助言などを行うと共に、在留中の日常生活に係る支援についても、適切に行っていきます。
  </div>
</div>
<div style="margin-bottom:8px;">
  <div style="font-weight:bold;">２　今次の受入れ機関において特定技能外国人として在留資格「特定技能１号」に該当する業務に従事するために同在留資格への在留資格変更許可申請を予定していること</div>
  <div class="indent1">
    <div>■　該当　□　非該当</div>
    <div>※　特定産業分野名：${ul('　'+f('f_field')+'　')}　／　業務区分：${ul('　'+f('f_category')+'　')}</div>
    <div style="font-size:9pt;">（注）特定技能制度における特定産業分野及び業務区分を記載すること。</div>
  </div>
</div>
<div style="margin-bottom:8px;">
  <div style="font-weight:bold;">３　申請人が今次の受入れ機関との契約に基づいて在留資格「特定技能１号」で従事する予定の業務と同様のものに従事すること</div>
  <div class="indent1">■　該当　□　非該当</div>
</div>
<div style="margin-bottom:8px;">
  <div style="font-weight:bold;">４　申請人が特定技能外国人として就労する場合に支払われる予定の報酬と同額，かつ，日本人が従事する場合と同等額以上の報酬を受けること</div>
  <div class="indent1">■　該当　□　非該当</div>
</div>
<div style="margin-bottom:8px;">
  <div style="font-weight:bold;">５　技能試験及び日本語試験に合格していること（次の（１）から（４）までのいずれかに該当していること）</div>
  <div class="indent1">${skillVal?'■':'□'}　該当（該当する番号：${f('f_skill')}　）　${skillVal?'□':'□'}　非該当</div>
  <div class="indent1" style="font-size:9pt;">
    <div>（１）試験（技能試験及び日本語試験）合格者</div>
    <div>（２）技能実習２号良好修了者</div>
    <div>（３）介護福祉士養成施設卒業者</div>
    <div>（４）ＥＰＡ介護福祉士候補者（４年間満了）</div>
  </div>
</div>
<div style="margin-bottom:8px;">
  <div style="font-weight:bold;">６　申請人の在留中の日常生活等に係る支援を適切に行うことが見込まれること（次の（１）から（３）までのいずれかに該当していること）</div>
  <div class="indent1" style="font-size:9pt;">
    <div style="margin-top:4px;">（１）過去２年間に外国人の受入れ又は管理を適正に行った実績があること　□　該当　□　非該当</div>
    <div style="margin-top:4px;">（２）外国人の生活相談に従事した経験がある者を選任していること　□　該当　□　非該当</div>
    <div style="margin-top:4px;">（３）登録支援機関に委託していること　■　該当　□　非該当</div>
    <div class="indent1">登録支援機関　名称：${ul('　'+f('f_soName')+'　')}　登録番号：${ul(f('f_soNo')+'　')}</div>
  </div>
</div>
<div style="margin-bottom:8px;">
  <div style="font-weight:bold;">７　今次の受入れ機関が，申請人を適正に受け入れることが見込まれること</div>
  <div class="indent1">■　該当　□　非該当</div>
</div>
<div style="font-size:8.5pt;margin-top:8px;border-top:1px solid #333;padding-top:6px;">
  <div>（注１）上記２から７までについて該当するものにチェックマークを付し，必要な事項を記入してください。</div>
  <div>（注２）本説明書に虚偽の記載があった場合には，特定技能外国人等の受入れができないこととなることがあります。</div>
  <div>（注３）本件申請に対して許可される在留資格「特定活動」は，あくまで「特定技能１号」への変更許可申請に係る準備のための在留資格です。</div>
</div>
<div style="margin-top:16px;text-align:right;">
  <div>${f('f_date')}</div>
  <div>受入れ機関名　　　　　${f('f_orgName')}</div>
</div>
</div>`;

  if(_fontSize!==8.5) _applyFontSize();
}

async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info;
  try{ info=JSON.parse(sel.value); }catch(e){ return; }
  const {caseId,companyId,companyName}=info;
  try{
    const [cases,persons]=await Promise.all([
      sb('cases?select=id,name,applicant,applicant_field,org,nationality&id=eq.'+caseId),
      sb('persons?select=applicant_name_en,nationality,skill_eval_type&case_id=eq.'+caseId)
    ]);
    const cas=cases&&cases[0];
    const pdRaw=persons&&persons[0];
    const pd=(pdRaw&&pdRaw.data)||pdRaw;
    const personName=(pd&&(pd.applicant_name_en||pd.applicantNameEn||pd.nameEn))||(cas&&cas.applicant)||'';
    const nationality=(pd&&pd.nationality)||(cas&&cas.nationality)||'';
    const _coQuery=companyId
      ?'companies?select=id,name&id=eq.'+companyId
      :(companyName?'companies?select=id,name&name=eq.'+encodeURIComponent(companyName):null);
    let coName=companyName||'';
    if(_coQuery){ const cos=await sb(_coQuery); if(cos&&cos[0]) coName=cos[0].name||coName; }
    const orgName=(cas&&cas.org)||'';
    let soNo='';
    if(orgName){ const sos=await sb('support_orgs?select=name,reg_no&name=eq.'+encodeURIComponent(orgName)); if(sos&&sos[0]) soNo=sos[0].reg_no||''; }
    const stripParens=s=>s?s.replace(/[（(][^）)]*[）)]/g,'').trim():'';
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(personName) s('f_name',personName);
    if(nationality) s('f_nationality',nationality);
    if(cas&&cas.applicant_field){ s('f_field',stripParens(cas.applicant_field)); }
    s('f_orgName',coName);
    s('f_soName',orgName);
    if(soNo) s('f_soNo',soNo);
    if(!v('f_date')){ const now=new Date(); s('f_date','令和'+(now.getFullYear()-2018)+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日'); }
    // 技能区分を skill_eval_type から自動判定
    const skillType = pd&&pd.skill_eval_type||'';
    if(skillType){
      const el=document.getElementById('f_skill');
      if(el){
        if(skillType.includes('実習２号')||skillType.includes('実習2号')) el.value='２';
        else if(skillType.includes('介護福祉士養成')) el.value='３';
        else if(skillType.includes('EPA')) el.value='４';
        else if(skillType.includes('試験')||skillType.includes('合格')) el.value='１';
      }
    }
    p();
    showToast('✅ データを読み込みました');
  }catch(e){ showToast('⚠️ 読込エラー: '+e.message); }
}

console.log('%c OFUSA 書類作成システム %c ver.20260415.07 ', 'background:#1a2e4a;color:white;font-weight:bold;padding:2px 6px;', 'background:#475569;color:white;padding:2px 6px;');
initCaseSelect();
p();
</script>
</body>
</html>
