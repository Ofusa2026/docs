async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info;
  try{ info=JSON.parse(sel.value); }catch(e){ return; }
  const {caseId,companyId,companyName}=info;
  try{
    const [cases,persons]=await Promise.all([
      sb('cases?select=id,name,applicant,applicant_field,org,nationality,emp_set_idx&id=eq.'+caseId),
      sb('persons?select=applicant_name_en,nationality,skill_eval_type&case_id=eq.'+caseId)
    ]);
    const cas=cases&&cases[0];
    const pdRaw=persons&&persons[0];
    const pd=(pdRaw&&pdRaw.data)||pdRaw;
    const personName=(pd&&(pd.applicant_name_en||pd.applicantNameEn||pd.nameEn))||(cas&&cas.applicant)||'';
    const nationality=(pd&&pd.nationality)||(cas&&cas.nationality)||'';
    const _coQuery=companyId
      ?'companies?select=id,name,emp_sets&id=eq.'+companyId
      :(companyName?'companies?select=id,name,emp_sets&name=eq.'+encodeURIComponent(companyName):null);
    let coName=companyName||'';
    let empSets=[];
    if(_coQuery){ const cos=await sb(_coQuery); if(cos&&cos[0]){ coName=cos[0].name||coName; empSets=cos[0].emp_sets||[]; } }
    const orgName=(cas&&cas.org)||'';
    let soNo='';
    if(orgName){ const sos=await sb('support_orgs?select=name,reg_no&name=eq.'+encodeURIComponent(orgName)); if(sos&&sos[0]) soNo=sos[0].reg_no||''; }
    const stripParens=s=>s?s.replace(/[（(][^）)]*[）)]/g,'').trim():s;
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(personName) s('f_name',personName);
    if(nationality) s('f_nationality',nationality);
    if(cas&&cas.applicant_field) s('f_field',stripParens(cas.applicant_field));
    // 業務区分: emp_setsから取得
    const empSetIdx=parseInt((cas&&cas.emp_set_idx)||info.empSetIdx||0)||0;
    const es=empSets[empSetIdx]||{};
    const cat=es.category||es.applicantCategory||es.categoryName||'';
    if(cat) s('f_category',stripParens(cat));
    s('f_orgName',coName);
    s('f_soName',orgName);
    if(soNo) s('f_soNo',soNo);
    if(!v('f_date')){ const now=new Date(); s('f_date','令和'+(now.getFullYear()-2018)+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日'); }
    // 技能区分
    const skillType=pd&&pd.skill_eval_type||'';
    if(skillType){
      const el=document.getElementById('f_skill');
      if(el){
        if(skillType.includes('実習２号')||skillType.includes('実習2号')) el.value='２';
        else if(skillType.includes('介護福祉士養成')) el.value='３';
        else if(skillType.includes('EPA')) el.value='４';
        else if(skillType.includes('試験')||skillType.includes('合格')) el.value='１';
      }
    }
    p();
    showToast('✅ データを読み込みました');
  }catch(e){ showToast('⚠️ 読込エラー: '+e.message); console.error(e); }
}
