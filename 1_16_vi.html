function _apply1_16_viFontSize(){
  const st=document.getElementById('_1_16_viFontStyle')||document.createElement('style');
  st.id='_1_16_viFontStyle'; document.head.appendChild(st);
  const s=_fontSize/10;
  st.textContent=[
    `.doc [style*="font-size:14pt"]{font-size:${(14*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:11pt"]{font-size:${(11*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:10pt"]{font-size:${(10*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9.5pt"]{font-size:${(9.5*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:8.5pt"]{font-size:${(8.5*s).toFixed(2)}pt!important}`,
    `.tbl{font-size:${(10*s).toFixed(2)}pt!important}`,
  ].join('');
}
async function loadFromDB(passedInfo){
  let info = passedInfo;
  if(!info){
    const sel=document.getElementById('caseSelect');
    if(!sel||!sel.value) return;
    try{ info=JSON.parse(sel.value); }catch(e){ return; }
  }
  if(!info||!info.caseId){ console.warn('[doc] no caseId'); return; }
  console.log('[doc] loadFromDB caseId='+info.caseId+' companyId='+info.companyId+' companyName='+info.companyName);
  const {caseId,companyId,companyName}=info;
  try{
    const [cases,cos]=await Promise.all([
      caseId?sb('cases?select=applicant,applicant_en&id=eq.'+caseId):Promise.resolve([]),
      companyId?sb(`companies?select=name,author_name,author_title&id=eq.${companyId}`)
        :companyName?sb(`companies?select=name,author_name,author_title&name=eq.${encodeURIComponent(companyName)}`):Promise.resolve([])
    ]);
    const cas=cases&&cases[0]; const co=cos&&cos[0];
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    if(co){
      s('f_company',co.name||'');
      s('f_author',[co.author_title,co.author_name].filter(Boolean).join('　'));
    }
    if(cas){
      s('f_applicant',cas.applicant_en||cas.applicant||'');
    }
    if(!v('f_docDate')){const n=new Date();document.getElementById('f_docDate').value=`令和${n.getFullYear()-2018}年${n.getMonth()+1}月${n.getDate()}日`;}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);console.error(e);}
}
initCaseSelect(); p();

function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp = document.querySelector('.pp');
    const area = document.getElementById('pageArea');
    if(!pp || !area) return;
    const ppW = pp.clientWidth - 40;
    const docW = 794;
    if(ppW < docW){
      const scale = ppW / docW;
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = scale; });
    } else {
      area.querySelectorAll('.doc').forEach(d=>{ d.style.zoom = 1; });
    }
  });
}
window.addEventListener('resize', fitDocToPreview);

window.addEventListener('message', async function(e){
  if(!e.data||e.data.type!=='SELECT_CASE') return;
  const info=e.data.info;
  if(!info||!info.caseId) return;
  const sel=document.getElementById('caseSelect');
  if(sel){
    let found=false;
    for(let o of sel.options){
      try{
        const d=JSON.parse(o.value);
        if(d.caseId===info.caseId){sel.value=o.value;found=true;break;}
      }catch(e2){}
    }
    if(!found){
      const opt=document.createElement('option');
      opt.value=JSON.stringify(info);
      opt.textContent='（indexから選択）';
      sel.appendChild(opt);
      sel.value=opt.value;
    }
  }
  // まず共通関数で全入力欄を埋める
  if(typeof loadCaseToForm==='function'){ await loadCaseToForm(info); }
  // 書類固有の追加処理があれば loadFromDB で補完
  if(typeof loadFromDB==='function') loadFromDB(info);
});
