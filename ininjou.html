<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>委任状（変更）</title>
<link rel="stylesheet" href="ofusa_common.css?v=1776264504">
<style>
.doc{padding:35mm 30mm 30mm 30mm!important;line-height:1.7!important;min-height:auto!important}
@media print{
  .app-bar,.fp{display:none!important}
  .main{display:block!important}
  .doc{box-shadow:none!important;margin:0!important}
}
</style>
</head>
<body>
<div class="app-bar">
  <div>
    <div class="app-bar-title">📄 委任状（変更）</div>
    <div class="ver">ver.20260416.05</div>
  </div>
  <div class="bar-btns">
    <button class="btn" id="editModeBtn" onclick="toggleEditMode()" style="background:#7c3aed;color:white;">✏️ 直接編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>
<div class="main">
<div class="fp">
  <div class="fp-case">
    <label>登録支援機関</label><select id="filterOrg" onchange="filterCases()"></select>
    <label>所属機関</label><select id="filterCompany" onchange="filterCases()"></select>
    <label>検索</label><input id="filterText" oninput="filterCases()" placeholder="名前で絞り込み">
    <label>案件選択 <span id="caseCount" style="color:#888;font-weight:normal;font-size:9px;"></span></label>
    <select id="caseSelect" onchange="loadFromDB()"></select>
  </div>
  <div class="fp-inner">
    <div class="fs"><div class="fs-title">委任者情報</div>
      <div class="fg"><label>書類作成日</label><input id="f_docDate" oninput="p()"></div>
      <div class="fg"><label>所属機関住所</label><input id="f_addr" oninput="p()"></div>
      <div class="fg"><label>所属機関名</label><input id="f_company" oninput="p()"></div>
      <div class="fg"><label>電話番号</label><input id="f_tel" oninput="p()"></div>
      <div class="fg"><label>代表役職</label><input id="f_title" oninput="p()"></div>
      <div class="fg"><label>代表者名</label><input id="f_rep" oninput="p()"></div>
    </div>
    <div class="fs"><div class="fs-title">申請種別</div>
      <div class="fg"><label>申請種別</label>
        <select id="f_appType" onchange="p()">
          <option value="change">変更申請</option>
          <option value="new">新規申請</option>
          <option value="notify">変更届け出</option>
        </select>
      </div>
    </div>
  </div>
</div>
<div class="pp">
  <div class="page-nav">
    <span class="page-nav-label">ページ:</span>
    <button class="pn-btn pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    <span style="margin-left:8px;font-size:10px;color:#aaa;font-family:sans-serif;">文字:</span>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(-0.5)" style="padding:2px 7px;">A-</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0)" style="padding:2px 7px;" id="fontSizeLabel">9pt</button>
    <button class="pn-btn" onmousedown="event.preventDefault();changeFontSize(0.5)" style="padding:2px 7px;">A+</button>
  </div>
  <div id="pageArea"></div>
</div>
</div>
<script src="ofusa_common.js?v=1776264504"></script>
<script>
function p(){
  if(_editMode) return;
  const w=document.getElementById('pageArea'); if(!w) return;
  const appType=document.getElementById('f_appType')?.value||'change';
  const cb=(val, target)=>val===target?'☑':'□';
  w.innerHTML=`
<div class="doc">
<div class="page-num-label">P1</div>
<div style="font-size:16pt;font-weight:bold;text-align:center;letter-spacing:8px;margin-bottom:8mm;">委　　　任　　　状</div>
<div style="font-size:12pt;font-weight:bold;margin-bottom:4mm;">受任者</div>
<div style="font-size:9pt;margin-bottom:8mm;margin-left:2em;">
  <div>所在地：（〒144-0052）東京都大田区蒲田５丁目１１−１０　FUNDES蒲田8階</div>
  <div>電話番号：03-6424-8849</div>
  <div>代理人氏名：　大房行政書士法人　大房　明良　　　（登録番号：第16081037号）</div>
  <div style="margin-left:2em;">（事務所名称又は法人名称＋代表行政書士氏名＋行政書士登録番号）</div>
  <div>担当者氏名：　大房　明良</div>
</div>
<div style="font-size:9pt;margin-bottom:6mm;">
  （注）個人事務所の場合：事務所代表者の事務所を行政書士証票と同一に記載すること。<br>
  　　　行政書士法人の場合：法人代表者の事業所（当該事務所が従たる事務所である場合にはその旨）を行政書士証票と同一に記載すること。
</div>
<div style="font-size:9pt;margin-bottom:6mm;">上記のものを代理人と定め、下記の権限を委任します。</div>
<div style="font-size:9pt;font-weight:bold;margin-bottom:3mm;">建設特定技能受け入れ計画のオンライン申請等について</div>
<div style="font-size:9pt;margin-bottom:2mm;">${cb(appType,'new')}　新規申請に関する次の事項</div>
<div style="font-size:9pt;margin-bottom:2mm;">${cb(appType,'change')}　変更申請に関する次の移行</div>
<div style="font-size:9pt;margin-bottom:4mm;">${cb(appType,'notify')}　変更届け出に関する次の事項</div>
<div style="font-size:9pt;font-weight:bold;margin-bottom:2mm;">（注）上記いずれか一つに☑選択すること。複数選択は、委任事項が不明確となるため不可。</div>
<div style="font-size:9pt;margin-bottom:1mm;">☑建設特定技能受入計画の申請又は届出に必要な書類の作成及び収集</div>
<div style="font-size:9pt;margin-bottom:1mm;">☑外国人就労管理システムへの入力および当該システムを利用した代理申請</div>
<div style="font-size:9pt;margin-bottom:2mm;margin-left:2em;">（適正な就労管理及び労働環境の確保に関する事項の宣誓については、宣誓内容を精続受入れ企業に説明してその同意を得たうえで、この同意先生の代理含む）</div>
<div style="font-size:9pt;margin-bottom:1mm;">☑申請内容の差し戻しによる補正及び追加資料の提出</div>
<div style="font-size:9pt;margin-bottom:1mm;">☑審査長との渉外調整（申請内容等に関する照会の対応等の一切の行為）</div>
<div style="font-size:9pt;margin-bottom:1mm;">☑申請の取下げ及び再申請</div>
<div style="font-size:9pt;margin-bottom:3mm;">☑建設特定技能受入計画認定証の受領に関する件</div>
<div style="font-size:9pt;font-weight:bold;margin-bottom:6mm;">（注）上記に該当する箇所に☑選択すること。複数選択可</div>
<div style="font-size:9pt;text-align:right;margin-bottom:2mm;">以上</div>
<div style="font-size:9pt;text-align:right;margin-bottom:6mm;">西暦　　　${f('f_docDate')}</div>
<div style="font-size:9pt;">
  <div style="margin-bottom:2mm;">住　　所　　${f('f_addr')}</div>
  <div style="margin-bottom:2mm;">氏名又は法人名称：　${f('f_company')}</div>
  <div style="margin-bottom:2mm;">電話番号：${f('f_tel')}</div>
  <div>役職・代表者名：　${f('f_title')}　${f('f_rep')}　　㊞</div>
</div>
</div>`;
  _fontSize = (_fontSize === 8.5) ? 9 : _fontSize;
  _applyFontSize();
  _applyInjouFontSize();
  const lbl=document.getElementById('fontSizeLabel');if(lbl)lbl.textContent=_fontSize+'pt';
  setupPageTracker();
  fitDocToPreview();
}
function _applyInjouFontSize(){
  const st=document.getElementById('_injouStyle')||document.createElement('style');
  st.id='_injouStyle'; document.head.appendChild(st);
  const s=_fontSize/9;
  st.textContent=[
    `.doc [style*="font-size:16pt"]{font-size:${(16*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:12pt"]{font-size:${(12*s).toFixed(2)}pt!important}`,
    `.doc [style*="font-size:9pt"]{font-size:${(9*s).toFixed(2)}pt!important}`,
  ].join('');
}
function fitDocToPreview(){
  requestAnimationFrame(()=>{
    const pp=document.querySelector('.pp');
    const area=document.getElementById('pageArea');
    if(!pp||!area) return;
    const ppW=pp.clientWidth-40; const docW=794;
    if(ppW<docW){const scale=ppW/docW;area.querySelectorAll('.doc').forEach(d=>{d.style.zoom=scale;});}
    else{area.querySelectorAll('.doc').forEach(d=>{d.style.zoom=1;});}
  });
}
window.addEventListener('resize', fitDocToPreview);

async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info; try{info=JSON.parse(sel.value);}catch(e){return;}
  const {companyId,companyName}=info;
  try{
    const q=companyId?`companies?select=name,address,tel,rep_title,rep_name&id=eq.${companyId}`
      :companyName?`companies?select=name,address,tel,rep_title,rep_name&name=eq.${encodeURIComponent(companyName)}`:null;
    if(!q) return;
    const cos=await sb(q); const co=cos&&cos[0]; if(!co) return;
    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    s('f_company',co.name||'');
    s('f_addr',co.address||'');
    s('f_tel',co.tel||'');
    s('f_title',co.rep_title||'');
    s('f_rep',co.rep_name||'');
    if(!v('f_docDate')){const n=new Date();s('f_docDate',`${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日`);}
    p(); showToast('✅ データを読み込みました');
  }catch(e){showToast('⚠️ 読込エラー: '+e.message);}
}
initCaseSelect(); p();
</script>
</body>
</html>
