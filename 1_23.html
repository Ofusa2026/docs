<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>参考様式第１－２３号</title>
<link rel="stylesheet" href="ofusa_common.css?v=20260415c">
<style>
@page{margin:0}
@media print{
  .appbar,.panel-left{display:none!important}
  .panel-right{margin:0!important;padding:0!important}
  .doc{padding:12mm 10mm;font-size:7.8pt;box-shadow:none!important;margin:0!important;page-break-after:always}
  .doc:last-child{page-break-after:auto}
  .f[style*="color:#aaa"]{visibility:hidden}
}
.officer-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:3px;border-bottom:0.5px solid #ccc;padding-bottom:3px}
.officer-label{font-size:7pt;color:#666;margin-bottom:1px}
</style>
</head>
<body>
<div class="appbar">
  <div class="appbar-title" id="docTitle">📄 参考様式第１－２３号</div>
  <div class="ver">ver.20260415.01</div>
  <div class="appbar-actions">
    <div class="pn-bar">
      <button class="pn-btn-page active" onclick="scrollToPage(1)">P1</button>
    </div>
    <label>文字: </label>
    <button class="btn btn-sm" onclick="changeFontSize(-0.5)">A-</button>
    <span id="fontSizeLabel">8.5pt</span>
    <button class="btn btn-sm" onclick="changeFontSize(0.5)">A+</button>
    <button id="editModeBtn" class="btn" onclick="toggleEditMode()">✏️ 直接編集</button>
    <button class="btn" onclick="saveEditedHTML()" style="background:#0369a1;color:white;">📥 編集保存</button>
    <button class="btn" onclick="loadEditedHTML()" style="background:#0369a1;color:white;">📂 編集呼出</button>
    <button class="btn" onclick="sendSignRequest()" style="background:#b45309;color:white;">✉️ 署名依頼</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷</button>
  </div>
</div>

<div class="layout">
  <div class="panel-left">
    <!-- 案件選択 -->
    <div class="filter-section">
      <div class="fg"><label>登録支援機関<span class="fid">filterOrg</span></label><select id="filterOrg" onchange="filterCases()" style="width:100%"><option value="">── すべて ──</option></select></div>
      <div class="fg"><label>所属機関<span class="fid">filterCompany</span></label><select id="filterCompany" onchange="filterCases()" style="width:100%"><option value="">── すべて ──</option></select></div>
      <div class="fg"><label>検索（案件名・人材名）</label><input id="filterText" oninput="filterCases()" placeholder="TRAN XUAN TRUNG" style="width:100%"></div>
      <div class="fg"><label>案件選択 <span id="caseCount" class="fid"></span></label>
        <select id="caseSelect" onchange="loadFromDB()" style="width:100%"><option value="">── 選択 ──</option></select>
      </div>
    </div>
    <hr>
    <!-- フォーム -->
    <div class="section-title">基本情報</div>
    <div class="fg"><label>書類作成日<span class="fid">co_docDate</span></label><input id="co_docDate" oninput="p()"></div>
    <div class="fg"><label>所属機関名<span class="fid">co_name</span></label><input id="co_name" oninput="p()"></div>
    <div class="fg"><label>作成責任者<span class="fid">co_author</span></label><input id="co_author" placeholder="代表取締役 山田太郎" oninput="p()"></div>
    <hr>
    <div class="section-title">役員情報（①〜⑧）</div>
    <div style="font-size:11px;color:#666;margin-bottom:8px;">代表取締役を除く役員を入力してください</div>
    <div id="officerList"></div>
  </div>

  <div class="panel-right" id="pageArea">
    <div class="doc">
      <div class="page-num-label">P1</div>
      <div id="docContent"></div>
    </div>
  </div>
</div>

<script src="ofusa_common.js?v=20260415c"></script>
<script>
// 役員フォーム生成
const MAX_OFFICERS = 8;
function buildOfficerForm() {
  const list = document.getElementById('officerList');
  list.innerHTML = '';
  for (let i = 1; i <= MAX_OFFICERS; i++) {
    list.innerHTML += `
      <div style="background:#f8f8f8;padding:6px 8px;border-radius:6px;margin-bottom:6px;">
        <div style="font-size:11px;font-weight:700;color:#333;margin-bottom:4px;">役員 ${['①','②','③','④','⑤','⑥','⑦','⑧'][i-1]}</div>
        <div class="fg"><label>ふりがな<span class="fid">off${i}Kana</span></label><input id="off${i}Kana" oninput="p()"></div>
        <div class="fg"><label>氏名<span class="fid">off${i}Name</span></label><input id="off${i}Name" oninput="p()"></div>
      </div>`;
  }
}

function v(id){return document.getElementById(id)?.value||'';}
function f(id){const raw=v(id);const val=raw.replace(/\n/g,'<br>');const label=id.replace(/^co_/,'co.').replace(/^off/,'off');return val?`<span class="f">${val}</span>`:`<span class="f" style="color:#aaa;font-size:0.85em;font-family:monospace;">${label}</span>`;}

function p(){
  if(_editMode) return;
  const officers = [];
  for(let i=1;i<=MAX_OFFICERS;i++){
    const kana=v(`off${i}Kana`), name=v(`off${i}Name`);
    if(kana||name) officers.push({num:['①','②','③','④','⑤','⑥','⑦','⑧'][i-1], kana, name, idx:i});
  }
  const allOfficers = Array.from({length:MAX_OFFICERS},(_,i)=>({
    num:['①','②','③','④','⑤','⑥','⑦','⑧'][i], kana:v(`off${i+1}Kana`), name:v(`off${i+1}Name`), idx:i+1
  }));

  document.getElementById('docContent').innerHTML = `
<div style="font-size:9pt;font-weight:bold;text-align:center;margin-bottom:6mm;">参考様式第１－２３号（規則第６条第１項第１号ニ関係）</div>
<div style="font-size:8.5pt;text-align:center;font-weight:bold;margin-bottom:4mm;">特定技能所属機関の役員に関する誓約書</div>

<div style="font-size:8pt;margin-bottom:6mm;">
入管法等関係法令を遵守し，特定技能外国人に対し，適切な就労環境を確保することを，以下の役員が連署して誓約します。
</div>

<div style="margin-bottom:6mm;">
  <table style="width:100%;border-collapse:collapse;font-size:8pt;">
    <tr style="background:#f0f0f0;">
      <th style="border:1px solid #333;padding:3px 6px;text-align:center;width:15%">番号</th>
      <th style="border:1px solid #333;padding:3px 6px;text-align:center;width:40%">ふりがな・氏名</th>
      <th style="border:1px solid #333;padding:3px 6px;text-align:center;width:45%">署名</th>
    </tr>
    ${allOfficers.map(o=>`
    <tr>
      <td style="border:1px solid #333;padding:3px 6px;text-align:center;">${o.num}</td>
      <td style="border:1px solid #333;padding:3px 6px;">
        <div style="font-size:7.5pt;">${o.kana?`<span class="f">${o.kana}</span>`:`<span class="f" style="color:#aaa;font-size:0.85em;font-family:monospace;">off${o.idx}Kana</span>`}</div>
        <div>${o.name?`<span class="f">${o.name}</span>`:`<span class="f" style="color:#aaa;font-size:0.85em;font-family:monospace;">off${o.idx}Name</span>`}</div>
      </td>
      <td style="border:1px solid #333;padding:3px 6px;height:18px;"></td>
    </tr>`).join('')}
  </table>
</div>

<div style="font-size:8pt;margin-bottom:4mm;">
上記のとおり誓約します。
</div>

<div style="text-align:right;font-size:8pt;margin-bottom:2mm;">
  ${f('co_docDate')}
</div>

<div style="text-align:right;font-size:8pt;">
  <div>特定技能所属機関の名称　${f('co_name')}</div>
  <div style="margin-top:2mm;">作成責任者職氏名　　　　${f('co_author')}</div>
  <div style="margin-top:8mm;">印</div>
</div>
`;
}

async function loadFromDB(){
  const sel=document.getElementById('caseSelect');
  if(!sel.value) return;
  let info;
  try{info=JSON.parse(sel.value);}catch(e){return;}
  const {caseId,companyId,companyName}=info;

  try{
    const _coQuery=companyId
      ?'companies?select=id,name,author_name,author_title,officers&id=eq.'+companyId
      :companyName
        ?'companies?select=id,name,author_name,author_title,officers&name=eq.'+encodeURIComponent(companyName)
        :null;
    if(!_coQuery){showToast('⚠️ 所属機関が特定できません');return;}

    const cos=await sb(_coQuery);
    const co=cos&&cos[0];
    if(!co){showToast('⚠️ 所属機関データが見つかりません');return;}

    const s=(id,val)=>{const e=document.getElementById(id);if(e&&val)e.value=val;};
    s('co_name', co.name||'');
    const authorStr=[co.author_title,co.author_name].filter(Boolean).join('　');
    s('co_author', authorStr);

    // 今日の日付
    if(!v('co_docDate')){
      const now=new Date();
      document.getElementById('co_docDate').value=`令和${now.getFullYear()-2018}年${now.getMonth()+1}月${now.getDate()}日`;
    }

    // 役員情報
    const officers=co.officers||[];
    // 代表取締役を除く
    const filtered=officers.filter(o=>!(o.title&&o.title.includes('代表')));
    filtered.forEach((o,i)=>{
      if(i>=MAX_OFFICERS) return;
      const idx=i+1;
      s(`off${idx}Kana`, o.kana||o.name_kana||'');
      s(`off${idx}Name`, o.name||'');
    });

    p();
    showToast('✅ データを読み込みました');
  }catch(e){
    showToast('⚠️ 読込エラー: '+e.message);
    console.error(e);
  }
}

buildOfficerForm();

console.log('%c OFUSA 書類作成システム %c ver.20260415.01 ', 'background:#1a2e4a;color:white;font-weight:bold;padding:2px 6px;', 'background:#475569;color:white;padding:2px 6px;');
initCaseSelect();
p();
</script>
</body>
</html>
